        <!-- Table -->

        <div class="table-responsive">

          <table class="table text-start align-middle table-bordered table-hover mb-0">

            <thead>
            <tr class="text-white">
              <th>ID</th>
              <th>Title</th>
              <th>Manager</th>
              <th>Category</th>
              <th>Price</th>
              <th>Status</th>
              <th>Created</th>
              <th class="text-center">Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="course : ${courses}">

              <td th:text="${course.id}"></td>

              <td>
                <strong th:text="${course.title}"></strong>
              </td>

              <td th:text="${course.instructorName}"></td>

              <td th:text="${course.categoryName}"></td>

              <td th:text="${course.salePrice}"></td>

              <td>
                                <span class="badge"
                                      th:classappend="${course.status == 'PUBLISHED'} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${course.status}">
                                </span>
              </td>

              <td th:text="${#temporals.format(course.createdAt,'dd/MM/yyyy')}"></td>

              <td class="text-center">

                <div class="d-flex justify-content-center gap-2">

                  <a th:href="@{/courses/{id}(id=${course.id})}"
                     class="btn btn-sm btn-outline-info">
                    <i class="fa fa-edit"></i>
                  </a>

                  <a th:href="@{/courses/{id}/content(id=${course.id})}"
                     class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-collection-play-fill"></i>
                  </a>

                  <button class="btn btn-sm btn-outline-warning"
                          th:data-url="@{/courses/{id}/status(id=${course.id})}"
                          onclick="confirmAction('Change course status?', this.dataset.url)">
                    <i class="bi bi-eye-slash-fill"></i>
                  </button>

                  <button class="btn btn-sm btn-outline-danger"
                          th:data-url="@{/courses/{id}/delete(id=${course.id})}"
                          onclick="confirmAction('Delete this course?', this.dataset.url)">
                    <i class="fa fa-trash"></i>
                  </button>

                </div>

              </td>

            </tr>

            <tr th:if="${#lists.isEmpty(courses)}">
              <td colspan="8" class="text-center text-muted py-4">
                No courses found
              </td>
            </tr>

            </tbody>

          </table>

        </div>

      </div>

<script th:inline="javascript">

  document.addEventListener("DOMContentLoaded", function() {

    var successMsg = /*[[${successMessage}]]*/ null;
    var errorMsg = /*[[${errorMessage}]]*/ null;

    if (successMsg) {
      showToast(successMsg, 'success');
    }

    if (errorMsg) {
      showToast(errorMsg, 'error');
    }

  });

</script>
