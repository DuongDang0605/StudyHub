<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>User Details - StudyHub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link th:href="@{/img/favicon.ico}" rel="icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded p-4 mx-auto" style="max-width: 900px;">

                <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-dark">
                    <h4 class="mb-0">User Details</h4>
                    <a th:href="@{/users/list}" class="btn btn-outline-primary btn-sm fw-medium">
                        <i class="fa fa-arrow-left me-1"></i> Back to Users
                    </a>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="fa fa-exclamation-triangle me-2"></i>
                    <div th:text="${errorMessage}"></div>
                </div>

                <form th:action="@{/users/{id}(id=${userDTO.id})}" th:object="${userDTO}" method="POST">

                    <input type="hidden" th:field="*{id}">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-medium">Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control bg-dark border-0 text-white" th:field="*{fullName}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control bg-dark border-0 text-white" th:field="*{email}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Role <span class="text-danger">*</span></label>
                                <div class="p-3 border border-secondary rounded bg-dark">
                                    <div class="form-check form-check-inline mt-1" th:each="role : ${allRoles}">
                                        <input class="form-check-input custom-check-roles" type="checkbox"
                                               th:field="*{roleIds}"
                                               th:value="${role.id}"
                                               style="
                                                  cursor: pointer;
                                                  /* Làm rõ viền khi chưa tick (màu xám sáng) */
                                                  border-color: rgba(255,255,255,0.5);
                                                  background-color: rgba(255,255,255,0.1);
                                               ">
                                        <label class="form-check-label text-white"
                                               style="cursor: pointer;"
                                               th:for="${#ids.prev('roleIds')}"
                                               th:text="${role.name}">Admin</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-medium">Username <span class="text-danger">*</span></label>
                                <input type="text" class="form-control bg-dark border-0 text-white" th:field="*{username}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Status</label>
                                <div class="d-flex gap-3 pt-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" th:field="*{status}" value="UNVERIFIED" style="cursor: pointer;">
                                        <label class="form-check-label text-muted" style="cursor: pointer;">Unverified</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" th:field="*{status}" value="ACTIVE" style="cursor: pointer;">
                                        <label class="form-check-label text-success fw-medium" style="cursor: pointer;">Active</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" th:field="*{status}" value="INACTIVE" style="cursor: pointer;">
                                        <label class="form-check-label text-danger fw-medium" style="cursor: pointer;">Inactive</label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Account Information</label>
                                <div class="p-3 bg-dark border-0 rounded text-muted" style="font-size: 0.9rem;">
                                    <div class="mb-1"><strong>Created:</strong> <span class="text-white" th:text="${#temporals.format(userDTO.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span></div>
                                    <div><strong>Last Updated:</strong> <span class="text-white" th:text="${#temporals.format(userDTO.updatedAt, 'yyyy-MM-dd HH:mm:ss')}"></span></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top border-dark">
                        <button type="submit" class="btn btn-primary fw-medium px-4">
                            <i class="fa fa-save me-1"></i> Submit
                        </button>
                    </div>

                </form>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>

<script>
    $(document).ready(function() {
        function updateCheckboxStyle(checkbox) {
            if ($(checkbox).is(':checked')) {
                $(checkbox).css({
                    'border-color': '#eb1616',
                    'background-color': '#eb1616'
                });
            } else {
                $(checkbox).css({
                    'border-color': 'rgba(255,255,255,0.5)',
                    'background-color': 'rgba(255,255,255,0.1)'
                });
            }
        }

        $('.custom-check-roles').each(function() {
            updateCheckboxStyle(this);
        });

        $('.custom-check-roles').on('change', function() {
            updateCheckboxStyle(this);
        });
    });
</script>

</body>

</html>
