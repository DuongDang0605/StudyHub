<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Chapter List - StudyHub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link th:href="@{/img/favicon.ico}" rel="icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded p-4 h-100">

                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb bg-transparent p-0 mb-3">
                        <li class="breadcrumb-item"><a th:href="@{/admin}">Dashboard</a></li>
                        <li class="breadcrumb-item text-white" th:text="${course.title}">Course Title</li>
                        <li class="breadcrumb-item active text-primary" aria-current="page">Chapters</li>
                    </ol>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">Chapters Management</h4>
                    <a href="#" class="btn btn-primary fw-medium px-3 rounded-1 shadow-sm">
                        <i class="fa fa-plus me-2"></i>Add New Chapter
                    </a>
                </div>

                <div class="table-responsive">
                    <table class="table text-start align-middle table-bordered table-hover mb-0">
                        <thead>
                        <tr class="text-white">
                            <th scope="col" style="width: 10%">Order</th>
                            <th scope="col" style="width: 25%">Chapter Title</th>
                            <th scope="col" style="width: 35%">Description</th>
                            <th scope="col" class="text-center" style="width: 10%">Status</th>
                            <th scope="col" class="text-center" style="width: 20%">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="chapter : ${chapters}">
                            <td class="text-white fw-bold" th:text="${chapter.orderNum}">1</td>

                            <td class="fw-bold" th:text="${chapter.title}">Introduction</td>

                            <td class="text-truncate" style="max-width: 250px;" th:text="${chapter.description}" th:title="${chapter.description}">
                                Description...
                            </td>

                            <td class="text-center">
                                        <span class="badge"
                                              th:classappend="${chapter.status == 'ACTIVE' ? 'bg-success' : 'bg-danger'}"
                                              th:text="${chapter.status}">
                                              ACTIVE
                                        </span>
                            </td>

                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-2">
                                    <a href="#" class="btn btn-sm btn-outline-info" title="Edit">
                                        <i class="fa fa-edit"></i>
                                    </a>
                                    <a href="#" class="btn btn-sm btn-outline-danger" title="Delete">
                                        <i class="fa fa-trash"></i>
                                    </a>
                                    <a th:href="@{/admin/chapters/{id}/lessons(id=${chapter.id})}" class="btn btn-sm btn-outline-primary" title="View Lessons">
                                        <i class="fa fa-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(chapters)}">
                            <td colspan="5" class="text-center text-muted py-4">No chapters found for this course.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-4 pt-3 border-top border-dark">
                    <a th:href="@{/admin}" class="btn btn-outline-primary btn-sm fw-medium">
                        <i class="fa fa-arrow-left me-1"></i> Back to Dashboard
                    </a>
                </div>

            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="fa fa-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>
</body>

</html>
