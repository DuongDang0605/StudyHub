<div th:fragment="global-alerts">

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
        <div id="globalToast" class="toast align-items-center text-white border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium" id="globalToastMessage">
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="globalConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content bg-secondary border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title text-white fw-bold">
                        <i class="fa fa-exclamation-triangle text-primary me-2"></i>Confirmation
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body text-center text-white" id="globalConfirmMessage">
                    Are you sure you want to proceed?
                </div>

                <div class="modal-footer border-top-0 d-flex justify-content-center pt-0">
                    <button type="button" class="btn btn-dark px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary px-4" id="btnGlobalConfirm">Yes, proceed</button>
                </div>
            </div>
        </div>
    </div>

</div>
