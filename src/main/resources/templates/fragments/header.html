<!-- fragments/header.html -->
<header class="topbar">
  <!-- Mobile menu toggle -->
  <button class="topbar-btn d-lg-none" id="sidebarToggle" style="display:flex!important">
    <i class="bi bi-list fs-5"></i>
  </button>

  <div style="flex:1">
    <div class="topbar-title">Dashboard</div>
    <nav aria-label="breadcrumb" style="line-height:1">
      <ol class="breadcrumb mb-0" style="font-size:.74rem">
        <li class="breadcrumb-item"><a href="/admin/dashboard" class="text-muted"><i class="bi bi-house-fill"></i></a></li>
        <li class="breadcrumb-item active text-muted">Dashboard</li>
      </ol>
    </nav>
  </div>

  <!-- Notifications -->
  <div class="dropdown">
    <button class="topbar-btn" data-bs-toggle="dropdown">
      <i class="bi bi-bell-fill"></i>
      <span class="notif-dot"></span>
    </button>
    <div class="dropdown-menu dropdown-menu-end shadow border-0 p-2" style="width:290px;border-radius:14px">
      <div class="px-2 pb-2 border-bottom mb-1">
        <strong style="font-size:.82rem">Notifications</strong>
      </div>
      <a href="#" class="dropdown-item rounded-3 py-2">
        <div class="d-flex gap-2">
          <div class="stat-icon si-amber flex-shrink-0" style="width:30px;height:30px;border-radius:8px;font-size:.8rem"><i class="bi bi-journal-plus"></i></div>
          <div>
            <div style="font-size:.78rem;font-weight:600">New enrollment pending</div>
            <div style="font-size:.7rem;color:var(--text-muted)">2 minutes ago</div>
          </div>
        </div>
      </a>
      <a href="#" class="dropdown-item rounded-3 py-2">
        <div class="d-flex gap-2">
          <div class="stat-icon si-green flex-shrink-0" style="width:30px;height:30px;border-radius:8px;font-size:.8rem"><i class="bi bi-check-circle"></i></div>
          <div>
            <div style="font-size:.78rem;font-weight:600">Course published successfully</div>
            <div style="font-size:.7rem;color:var(--text-muted)">1 hour ago</div>
          </div>
        </div>
      </a>
    </div>
  </div>

  <!-- Avatar -->
  <div class="dropdown">
    <div class="avatar-circle" data-bs-toggle="dropdown" style="cursor:pointer;border:2px solid var(--primary-light)">A</div>
    <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="border-radius:12px;min-width:170px;margin-top:6px">
      <li class="px-3 py-2 border-bottom">
        <div style="font-weight:700;font-size:.82rem">Administrator</div>
        <div style="font-size:.72rem;color:var(--text-muted)">admin@studyhub.com</div>
      </li>
      <li><a class="dropdown-item mt-1" href="/profile"><i class="bi bi-person me-2"></i>Profile</a></li>
      <li><a class="dropdown-item" href="/change-password"><i class="bi bi-key me-2"></i>Change Password</a></li>
      <li><hr class="dropdown-divider"></li>
      <li><a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Log Out</a></li>
    </ul>
  </div>
</header>
