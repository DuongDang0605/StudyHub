<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title th:text="${pageTitle}">Chapter Details</title>

  <link th:href="@{/img/favicon.ico}" rel="icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">
  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">
      <div class="bg-light rounded p-4 h-100 shadow-sm">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0 text-dark" th:text="${pageTitle} + ' - Chapter Details'">Chapter Details</h4>
          <a th:href="@{'/admin/courses/' + ${courseId} + '/content'}" class="btn btn-outline-secondary btn-sm">
            <i class="fa fa-arrow-left me-1"></i>Back to Course
          </a>
        </div>
        <hr>

        <div class="row">
          <div class="col-md-8 col-lg-6">
            <form th:action="@{'/admin/courses/' + ${courseId} + '/chapters/save'}" th:object="${chapter}" method="post">

              <input type="hidden" th:field="*{id}" />

              <div class="mb-3">
                <label class="form-label fw-bold">Chapter Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{title}" placeholder="Enter chapter title" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Description</label>
                <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Briefly describe what this chapter is about..."></textarea>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold">Order <span class="text-danger">*</span></label>
                <input type="number" class="form-control w-50" th:field="*{orderNum}" min="1" required>
                <div class="form-text">Position of this chapter in the course structure.</div>
              </div>

              <button type="submit" class="btn btn-primary px-4">
                <i class="fa fa-save me-1"></i> Save Chapter
              </button>
            </form>
          </div>
        </div>

      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
