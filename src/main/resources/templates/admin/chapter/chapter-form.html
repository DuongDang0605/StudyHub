<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title th:text="${pageTitle} + ' - StudyHub'">Chapter Details</title>

  <link th:href="@{/img/favicon.ico}" rel="icon"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">

  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">

      <div class="bg-secondary rounded p-4 mx-auto shadow-sm" style="max-width: 800px;">

        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-dark">
          <h4 class="mb-0 text-white" th:text="${pageTitle} + ' - Chapter Details'">Chapter Details</h4>
          <a th:href="@{'/admin/courses/' + ${courseId} + '/content'}" class="btn btn-outline-primary btn-sm fw-medium">
            <i class="fa fa-arrow-left me-1"></i>Back to Course
          </a>
        </div>

        <form th:action="@{'/admin/courses/' + ${courseId} + '/chapters/save'}" th:object="${chapter}" method="post">

          <input type="hidden" th:field="*{id}" />

          <div class="row g-4">
            <div class="col-12">
              <label class="form-label fw-medium text-white">Chapter Title <span class="text-danger">*</span></label>
              <input type="text" class="form-control bg-dark border-0 text-white" th:field="*{title}" placeholder="Enter chapter title" required>
            </div>

            <div class="col-12">
              <label class="form-label fw-medium text-white">Description</label>
              <textarea class="form-control bg-dark border-0 text-white" th:field="*{description}" rows="5" placeholder="Briefly describe what this chapter is about..."></textarea>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-medium text-white">Order <span class="text-danger">*</span></label>
              <input type="number" class="form-control bg-dark border-0 text-white" th:field="*{orderNum}" min="1" required>
              <div class="form-text text-muted mt-2"><i class="fa fa-info-circle me-1"></i>Position of this chapter in the course structure.</div>
            </div>
          </div>

          <div class="mt-4 pt-3 border-top border-dark d-flex justify-content-end gap-3">
            <a th:href="@{'/admin/courses/' + ${courseId} + '/content'}" class="btn btn-dark fw-medium px-4">Cancel</a>
            <button type="submit" class="btn btn-primary fw-medium px-4">
              <i class="fa fa-save me-1"></i> Save Chapter
            </button>
          </div>

        </form>

      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>

  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="fa fa-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
