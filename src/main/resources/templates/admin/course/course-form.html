<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title th:text="${formMode == 'create' ? 'Create Course' : (formMode == 'edit' ? 'Edit Course' : 'Course Details')} + ' - StudyHub'">Course Details - StudyHub</title>

  <link th:href="@{/img/favicon.ico}" rel="icon"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
  <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">

  <!-- Sidebar -->
  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">

      <div class="bg-secondary rounded p-4 h-100">

        <!-- Page Title -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0" th:text="${formMode == 'create' ? 'Create Course' : (formMode == 'edit' ? 'Edit Course' : 'Course Details')}">Course Details</h4>
          <a href="/admin/courses" class="btn btn-outline-secondary btn-sm">
            <i class="fa fa-arrow-left me-1"></i>Back
          </a>
        </div>

        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
          <i class="fa fa-check-circle me-2"></i>
          <span th:text="${success}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
          <i class="fa fa-exclamation-triangle me-2"></i>
          <span th:text="${error}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Form -->
        <div class="table-responsive">
          <form th:action="@{${formMode == 'create' ? '/admin/courses/new' : '/admin/courses/' + course.id}}"
                method="post"
                th:object="${course}">

            <div class="row g-3">
              <div class="col-md-12">
                <label class="form-label">Title *</label>
                <input type="text" class="form-control" name="title"
                       th:value="${course.title != null ? course.title : ''}"
                       th:readonly="${formMode == 'detail'}" required/>
              </div>

              <div class="col-md-6">
                <label class="form-label">Category</label>
                <select class="form-select" th:field="*{categoryId}" th:disabled="${formMode == 'detail'}">
                  <option value="">Select Category</option>
                  <option th:each="category : ${categories}"
                          th:value="${category.id}"
                          th:text="${category.value}"
                          th:selected="${course.categoryId != null and course.categoryId == category.id}">Programming</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Manager</label>
                <select class="form-select" th:field="*{instructorId}" th:disabled="${formMode == 'detail'}">
                  <option value="">Select Manager</option>
                  <option th:each="instructor : ${instructors}"
                          th:value="${instructor.id}"
                          th:text="${instructor.fullName}">
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Level</label>
                <select class="form-select" th:field="*{levelId}" th:disabled="${formMode == 'detail'}">
                  <option value="">Select Level</option>
                  <option th:each="level : ${levels}"
                          th:value="${level.id}"
                          th:text="${level.value}"
                          th:selected="${course.levelId != null and course.levelId == level.id}">Beginner</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Duration (hours) *</label>
                <input type="number" class="form-control" name="duration"
                       th:value="${course.duration != null ? course.duration : ''}"
                       th:readonly="${formMode == 'detail'}" required/>
              </div>

              <div class="col-md-6">
                <label class="form-label">Listed Price ($) *</label>
                <input type="text" class="form-control" name="listedPrice"
                       th:value="${course.listedPrice != null ? course.listedPrice : ''}"
                       th:readonly="${formMode == 'detail'}" required
                       pattern="[0-9]+(\.[0-9]+)?"
                       placeholder="Enter price (e.g., 99.99)"/>
              </div>

              <div class="col-md-6">
                <label class="form-label">Sale Price ($)</label>
                <input type="text" class="form-control" name="salePrice"
                       th:value="${course.salePrice != null ? course.salePrice : ''}"
                       th:readonly="${formMode == 'detail'}"
                       pattern="[0-9]+(\.[0-9]+)?"
                       placeholder="Enter price (e.g., 79.99)"/>
              </div>

              <div class="col-12">
                <div class="d-flex gap-4">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="published" name="published"
                           th:checked="${course.published}" th:disabled="${formMode == 'detail'}"/>
                    <label class="form-check-label fw-600" for="published">Published</label>
                  </div>
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="featured" name="isFeatured"
                           th:checked="${course.isFeatured}" th:disabled="${formMode == 'detail'}"/>
                    <label class="form-check-label fw-600" for="featured">Featured</label>
                  </div>
                  <!-- Hidden fields to ensure proper binding -->
                  <!--                  <input type="hidden" name="published" th:value="${course.published ? 'true' : 'false'}"/>-->
                  <!--                  <input type="hidden" name="isFeatured" th:value="${course.isFeatured ? 'true' : 'false'}"/>-->
                </div>
              </div>

              <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="4"
                          th:readonly="${formMode == 'detail'}" th:text="${course.description != null ? course.description : ''}"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label">Thumbnail URL</label>
                <input type="text" class="form-control" name="thumbnail"
                       th:value="${course.thumbnail != null ? course.thumbnail : ''}"
                       th:readonly="${formMode == 'detail'}"/>
              </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-4" th:if="${formMode != 'detail'}">
              <button type="submit" class="btn btn-primary">
                <i class="fa fa-save me-1"></i>
                <span th:text="${formMode == 'create' ? 'Create Course' : 'Save Changes'}">Save Changes</span>
              </button>
              <a href="/admin/courses" class="btn btn-outline-secondary">
                <i class="fa fa-times me-1"></i>Cancel
              </a>
            </div>

            <div class="d-flex gap-2 mt-4" th:if="${formMode == 'detail'}">
              <a th:href="@{'/admin/courses/' + ${course.id} + '/edit'}" class="btn btn-primary">
                <i class="fa fa-edit me-1"></i>Edit Course
              </a>
              <a href="/admin/courses" class="btn btn-outline-secondary">
                <i class="fa fa-arrow-left me-1"></i>Back
              </a>
            </div>
          </form>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

  </div>
</div>

<!-- Notifications -->
<div th:replace="~{fragments/notifications :: global-alerts}"></div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>
