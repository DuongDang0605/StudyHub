<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Course Detail - StudyHub</title>

  <link th:href="@{/img/favicon.ico}" rel="icon"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
  <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">

  <!-- Sidebar -->
  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">

      <div class="bg-secondary rounded p-4 h-100">

        <!-- Page Title -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0">Course Detail</h4>
          <a href="/admin/courses" class="btn btn-outline-secondary btn-sm">
            <i class="fa fa-arrow-left me-1"></i>Back to Courses
          </a>
        </div>

        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
          <i class="fa fa-check-circle me-2"></i>
          <span th:text="${success}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
          <i class="fa fa-exclamation-triangle me-2"></i>
          <span th:text="${error}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Course Detail Form -->
        <div class="col-12">
          <div class="bg-light rounded p-4 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="mb-0">
                <i class="fa fa-info-circle me-2 text-primary"></i>
                Course Information
                <span class="badge bg-secondary ms-2">Read Only</span>
              </h5>
            </div>

            <form>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Title</label>
                  <input type="text" class="form-control" th:value="${course.title}" readonly />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Category</label>
                  <input type="text" class="form-control" th:value="${course.categoryName}" readonly />
                </div>
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Instructor</label>
                  <input type="text" class="form-control" th:value="${course.instructorName}" readonly />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Level</label>
                  <input type="text" class="form-control" th:value="${course.levelName}" readonly />
                </div>
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Duration</label>
                  <input type="text" class="form-control" th:value="${course.duration + ' hours'}" readonly />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Listed Price ($)</label>
                  <input type="text" class="form-control" th:value="${course.listedPrice}" readonly />
                </div>
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Sale Price ($)</label>
                  <input type="text" class="form-control" th:value="${course.salePrice}" readonly />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Status</label>
                  <input type="text" class="form-control" th:text="${course.status}" readonly />
                </div>
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Created Date</label>
                  <input type="text" class="form-control" th:value="${#temporals.format(course.createdAt, 'dd/MM/yyyy HH:mm')}" readonly />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Thumbnail URL</label>
                  <input type="text" class="form-control" th:value="${course.thumbnail}" readonly />
                </div>
              </div>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Description</label>
                  <textarea class="form-control" rows="4" th:text="${course.description}" readonly></textarea>
                </div>
              </div>
            </form>

            <!-- Action Buttons -->
            <div class="d-flex gap-2 mt-4">
              <a th:href="@{'/admin/courses/' + ${course.id} + '/edit'}" class="btn btn-primary">
                <i class="fa fa-edit me-1"></i>Edit Course
              </a>
              <a th:href="@{'/admin/courses/' + ${course.id} + '/content'}" class="btn btn-info">
                <i class="fa fa-list me-1"></i>Manage Content
              </a>
              <a href="/admin/courses" class="btn btn-outline-secondary">
                <i class="fa fa-arrow-left me-1"></i>Back to Courses
              </a>
            </div>
          </div>
        </div>

        <!-- Thumbnail Preview -->
        <div class="col-12 mt-4">
          <div class="bg-light rounded p-4">
            <h5 class="mb-3">
              <i class="fa fa-image me-2 text-primary"></i>
              Course Thumbnail
            </h5>
            <div class="text-center">
              <img th:if="${course.thumbnail}"
                   th:src="${course.thumbnail}"
                   class="img-fluid rounded shadow"
                   style="max-height: 200px; object-fit: cover;"
                   th:alt="${course.title}" />
              <div th:unless="${course.thumbnail}"
                   class="text-muted py-5">
                <i class="fa fa-image" style="font-size: 3rem;"></i>
                <p class="mt-2">No thumbnail available</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

  </div>
</div>

<!-- Notifications -->
<div th:replace="~{fragments/notifications :: global-alerts}"></div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>
