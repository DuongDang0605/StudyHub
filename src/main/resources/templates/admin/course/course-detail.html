<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Course Detail - StudyHub</title>

  <link th:href="@{/img/favicon.ico}" rel="icon"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
  <link th:href="@{/css/main.css}" rel="stylesheet"/>
  <style>
    /* CSS để các ô readonly trông giống y hệt lúc edit trong ảnh 05ebda */
    .form-control:disabled, .form-control[readonly] {
      background-color: #000000 !important;
      color: #ffffff !important;
      opacity: 1;
      border: 1px solid #2c2f33;
    }
    .form-label {
      color: #6c7293;
      font-size: 0.85rem;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">
  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">
      <div class="bg-secondary rounded p-4 h-100">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="d-flex align-items-center">
            <h4 class="mb-0 text-white">Course Details</h4>
            <span class="badge bg-dark text-white-50 ms-3 fw-normal" style="border: 1px solid #444;">Read Only</span>
          </div>
          <a href="/admin/courses" class="btn btn-outline-primary btn-sm">
            <i class="fa fa-arrow-left me-1"></i>Back
          </a>
        </div>

        <div class="table-responsive">
          <form>
            <div class="row g-3">
              <div class="col-md-12">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" th:value="${course.title}" readonly/>
              </div>

              <div class="col-md-6">
                <label class="form-label">Category</label>
                <input type="text" class="form-control" th:value="${course.categoryName}" readonly/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Manager (Instructor)</label>
                <input type="text" class="form-control" th:value="${course.instructorName}" readonly/>
              </div>

              <div class="col-md-6">
                <label class="form-label">Level</label>
                <input type="text" class="form-control" th:value="${course.levelName}" readonly/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Duration (hours)</label>
                <input type="text" class="form-control" th:value="${course.duration}" readonly/>
              </div>

              <div class="col-md-6">
                <label class="form-label">Listed Price ($)</label>
                <input type="text" class="form-control" th:value="${course.listedPrice}" readonly/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Sale Price ($)</label>
                <input type="text" class="form-control" th:value="${course.salePrice}" readonly/>
              </div>

              <div class="col-12 my-3">
                <div class="d-flex gap-4">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="published"
                           th:checked="${course.published}" disabled/>
                    <label class="form-check-label text-white-50" for="published">Published Status</label>
                  </div>
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="featured"
                           th:checked="${course.isFeatured}" disabled/>
                    <label class="form-check-label text-white-50" for="featured">Featured Status</label>
                  </div>
                </div>
              </div>

              <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" rows="4" th:text="${course.description}" readonly></textarea>
              </div>

              <div class="col-12">
                <label class="form-label">Thumbnail URL</label>
                <input type="text" class="form-control" th:value="${course.thumbnail}" readonly/>
              </div>

              <div class="col-12 mt-4" th:if="${course.thumbnail}">
                <div class="p-3 bg-dark rounded border border-dark text-center">
                  <label class="form-label d-block text-start mb-3">Thumbnail Preview</label>
                  <img th:src="${course.thumbnail}" class="img-fluid rounded shadow"
                       style="max-height: 250px; object-fit: cover;" />
                </div>
              </div>
            </div>

            <div class="d-flex gap-2 mt-5 pt-3 border-top border-dark">
              <a th:href="@{'/admin/courses/' + ${course.id} + '/edit'}" class="btn btn-primary">
                <i class="fa fa-edit me-1"></i>Edit Course
              </a>
              <a th:href="@{'/admin/courses/' + ${course.id} + '/content'}" class="btn btn-info text-dark fw-bold">
                <i class="fa fa-list me-1"></i>Manage Content
              </a>
              <a href="/admin/courses" class="btn btn-outline-light">
                <i class="fa fa-arrow-left me-1"></i>Back
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
