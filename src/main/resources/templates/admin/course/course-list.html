<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Courses Management - StudyHub</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link th:href="@{/css/main.css}" rel="stylesheet">

</head>

<body>

<div class="container-fluid position-relative d-flex p-0">

  <!-- Sidebar -->
  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">

      <div class="bg-secondary rounded p-4 h-100">

        <!-- Page Title -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0">Courses Management</h4>

          <a th:href="@{/admin/courses/new}" class="btn btn-primary fw-medium px-3 shadow-sm">
            <i class="fa fa-plus me-2"></i>Add Course
          </a>
        </div>

        <!-- Success/Error Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
          <i class="fa fa-check-circle me-2"></i>
          <span th:text="${successMessage}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
          <i class="fa fa-exclamation-triangle me-2"></i>
          <span th:text="${errorMessage}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filter -->
        <div class="bg-dark rounded p-3 mb-4">

          <form th:action="@{/admin/courses}" method="get">

            <div class="row g-3 align-items-center">

              <!-- Search -->
              <div class="col-md-4">
                <input type="text"
                       name="keyword"
                       class="form-control bg-secondary border-0 text-white"
                       placeholder="Search courses..."
                       th:value="${currentKeyword}">
              </div>

              <!-- Category -->
              <div class="col-md-3">
                <select name="categoryId"
                        class="form-select bg-secondary border-0 text-white">

                  <option value="">All Categories</option>

                  <option th:each="c : ${categories}"
                          th:value="${c.id}"
                          th:text="${c.name}"
                          th:selected="${c.id == currentCategoryId}">
                  </option>

                </select>
              </div>

              <!-- Status -->
              <div class="col-md-3">
                <select name="status"
                        class="form-select bg-secondary border-0 text-white">

                  <option value="">All Status</option>

                  <option value="PUBLISHED"
                          th:selected="${currentStatus == 'PUBLISHED'}">
                    Published
                  </option>

                  <option value="UNPUBLISHED"
                          th:selected="${currentStatus == 'UNPUBLISHED'}">
                    Unpublished
                  </option>

                </select>
              </div>

              <!-- Buttons -->
              <div class="col-md-2 d-flex gap-2">

                <button type="submit" class="btn btn-primary flex-grow-1">
                  <i class="fa fa-filter"></i>
                </button>

                <a th:href="@{/admin/courses}"
                   class="btn btn-outline-primary">
                  <i class="fa fa-undo"></i>
                </a>

              </div>

            </div>

          </form>

        </div>

        <!-- Table -->

        <div class="table-responsive">

          <table class="table text-start align-middle table-bordered table-hover mb-0">

            <thead>
            <tr class="text-white">
              <th>ID</th>
              <th>Title</th>
              <th>Manager</th>
              <th>Category</th>
              <th>Price</th>
              <th>Status</th>
              <th>Created</th>
              <th class="text-center">Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="course : ${courses}">

              <td th:text="${course.id}"></td>

              <td>
                <strong th:text="${course.title}"></strong>
              </td>

              <td th:text="${course.instructorName}"></td>

              <td th:text="${course.categoryName}"></td>

              <td th:text="${course.salePrice}"></td>

              <td>
                                <span class="badge"
                                      th:classappend="${course.status == 'PUBLISHED'} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${course.status}">
                                </span>
              </td>

              <td th:text="${#temporals.format(course.createdAt,'dd/MM/yyyy')}"></td>

              <td class="text-center">

                <div class="d-flex justify-content-center gap-2">
                  <a th:href="@{/admin/courses/{id}/detail(id=${course.id})}"
                     class="btn btn-sm btn-outline-info">
                    <i class="fa fa-eye"></i>
                  </a>

                  <a th:href="@{/admin/courses/{id}/content(id=${course.id})}"
                     class="btn btn-sm btn-outline-primary">
                    <i class="fa fa-list"></i>
                  </a>

                  <a th:href="@{/admin/courses/{id}/edit(id=${course.id})}"
                     class="btn btn-sm btn-outline-warning">
                    <i class="fa fa-edit"></i>
                  </a>

                  <button class="btn btn-sm btn-outline-danger"
                          th:data-url="@{/admin/courses/{id}/delete(id=${course.id})}"
                          onclick="confirmAction('Delete this course?', this.dataset.url)">
                    <i class="fa fa-trash"></i>
                  </button>
                </div>

              </td>

            </tr>

            <tr th:if="${#lists.isEmpty(courses)}">
              <td colspan="8" class="text-center text-muted py-4">
                No courses found
              </td>
            </tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

  </div>

</div>

<a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top">
  <i class="fa fa-arrow-up"></i>
</a>

<!-- Notifications -->
<div th:replace="~{fragments/notifications :: global-alerts}"></div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteModalLabel">Confirm Delete</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="deleteMessage">Are you sure you want to delete this item?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JavaScript for Actions -->
<script>
  let deleteUrl = '';

  function confirmAction(message, url) {
    deleteUrl = url;
    document.getElementById('deleteMessage').innerHTML = message;
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
  }

  document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
    if (deleteUrl) {
      // Create a form to send POST/DELETE request
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = deleteUrl;

      // Add method override for DELETE if needed
      const methodInput = document.createElement('input');
      methodInput.type = 'hidden';
      methodInput.name = '_method';
      methodInput.value = 'DELETE';
      form.appendChild(methodInput);

      // Add CSRF token if exists
      const csrfToken = document.querySelector('meta[name="_csrf"]');
      if (csrfToken) {
        const csrfInput = document.createElement('input');
        csrfInput.type = 'hidden';
        csrfInput.name = '_csrf';
        csrfInput.value = csrfToken.getAttribute('content');
        form.appendChild(csrfInput);
      }

      document.body.appendChild(form);
      form.submit();
    }
  });
</script>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/app.js}"></script>

<script th:inline="javascript">

  document.addEventListener("DOMContentLoaded", function() {

    var successMsg = /*[[${successMessage}]]*/ null;
    var errorMsg = /*[[${errorMessage}]]*/ null;

    if (successMsg) {
      showToast(successMsg, 'success');
    }

    if (errorMsg) {
      showToast(errorMsg, 'error');
    }

  });

</script>

</body>
</html>
