<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Learning Admin - Dashboard</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta content="" name="keywords">
  <meta content="" name="description">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">
  <link th:href="@{/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css}" rel="stylesheet" />

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">
      <div class="row g-4">
        <div class="col-sm-6 col-xl-3">
          <div class="bg-secondary rounded d-flex align-items-center justify-content-between p-4">
            <i class="fa fa-users fa-3x text-primary"></i>
            <div class="ms-3 text-end">
              <p class="mb-2">Total Users</p>
              <h6 class="mb-0 text-white" th:text="${totalUsers}">4</h6>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="bg-secondary rounded d-flex align-items-center justify-content-between p-4">
            <i class="fa fa-book-open fa-3x text-success"></i>
            <div class="ms-3 text-end">
              <p class="mb-2">Total Courses</p>
              <h6 class="mb-0 text-white" th:text="${totalCourses}">7</h6>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="bg-secondary rounded d-flex align-items-center justify-content-between p-4">
            <i class="fa fa-file-alt fa-3x text-info"></i>
            <div class="ms-3 text-end">
              <p class="mb-2">Published Posts</p>
              <h6 class="mb-0 text-white" th:text="${publishedPostsCount}">2</h6>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="bg-secondary rounded d-flex align-items-center justify-content-between p-4">
            <i class="fa fa-check-circle fa-3x text-warning"></i>
            <div class="ms-3 text-end">
              <p class="mb-2">Published Courses</p>
              <h6 class="mb-0 text-white" th:text="${publishedCoursesCount}">7</h6>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container-fluid pt-4 px-4">
      <div class="bg-secondary text-center rounded p-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h5 class="mb-0 text-white">Recent Courses</h5>
          <a th:href="@{/admin/courses}" class="btn btn-sm btn-outline-primary">Show All</a>
        </div>
        <div class="table-responsive">
          <table class="table text-start align-middle table-bordered table-hover mb-0">
            <thead>
            <tr class="text-white">
              <th scope="col">Title</th>
              <th scope="col">Instructor</th>
              <th scope="col">Category</th>
              <th scope="col" class="text-center">Status</th>
              <th scope="col">Created</th>
              <th scope="col" class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${recentCourses}">
              <td class="text-white fw-bold" th:text="${course.title}">AI Automation</td>
              <td th:text="${course.instructor.fullName}">Instructor Name</td>
              <td th:text="${course.category.name}">Programming</td>
              <td class="text-center">
                                        <span class="badge"
                                              th:classappend="${course.status == 'PUBLISHED' ? 'bg-success' : 'bg-warning'}"
                                              th:text="${course.status}">
                                              PUBLISHED
                                        </span>
              </td>
              <td th:text="${#temporals.format(course.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-08 10:00</td>
              <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                  <a th:href="@{/admin/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-info" title="Update Course">
                    <i class="fa fa-edit"></i>
                  </a>
                  <a th:href="@{/admin/{id}/chapters(id=${course.id})}" class="btn btn-sm btn-outline-primary" title="View Chapters">
                    <i class="fa fa-list"></i>
                  </a>
                </div>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(recentCourses)}">
              <td colspan="6" class="text-center text-muted py-4">No recent courses found.</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/lib/chart/chart.min.js}"></script>
<script th:src="@{/lib/easing/easing.min.js}"></script>
<script th:src="@{/lib/waypoints/waypoints.min.js}"></script>
<script th:src="@{/lib/owlcarousel/owl.carousel.min.js}"></script>
<script th:src="@{/lib/tempusdominus/js/moment.min.js}"></script>
<script th:src="@{/lib/tempusdominus/js/moment-timezone.min.js}"></script>
<script th:src="@{/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js}"></script>

<script th:src="@{/js/main.js}"></script>
</body>

</html>
