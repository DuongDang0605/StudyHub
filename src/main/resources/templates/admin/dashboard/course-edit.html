<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Course - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen p-8">

<div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
    <div class="bg-gray-800 p-6 flex justify-between items-center text-white">
        <h2 class="text-xl font-bold"><i class="fas fa-edit mr-2"></i>Edit Course</h2>
        <a th:href="@{/admin}" class="text-sm bg-gray-600 hover:bg-gray-700 px-3 py-1 rounded">Back</a>
    </div>

    <form th:action="@{/admin/update}" th:object="${course}" method="post" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
        <input type="hidden" th:field="*{id}">

        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Course Title</label>
            <input type="text" th:field="*{title}" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Instructor</label>
            <select th:field="*{instructorId}" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                <option value="">-- Select Instructor --</option>
                <option th:each="inst : ${instructors}"
                        th:value="${inst.id}"
                        th:text="${inst.fullName}"></option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Category</label>
            <select th:field="*{categoryId}" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                <option value="">-- Select Category --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Status</label>
            <select th:field="*{status}" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                <option value="PUBLISHED">PUBLISHED</option>
                <option value="UNPUBLISHED">UNPUBLISHED</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Listed Price ($)</label>
            <input type="number" step="0.01" th:field="*{listedPrice}" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
        </div>

        <div class="flex items-center mt-6">
            <input type="checkbox" th:field="*{isFeatured}" class="h-4 w-4 text-blue-600 border-gray-300 rounded">
            <label class="ml-2 block text-sm font-medium text-gray-700">Featured Course</label>
        </div>

        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Description</label>
            <textarea th:field="*{description}" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
        </div>

        <div class="md:col-span-2 flex justify-end space-x-3 mt-4">
            <button type="reset" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">Reset</button>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold shadow">Save Changes</button>
        </div>
    </form>
</div>

</body>
</html>
