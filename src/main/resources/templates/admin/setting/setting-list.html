<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>System Settings - StudyHub</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">

  <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4" th:if="${section == 'settings'}">
      <div class="bg-secondary rounded p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="mb-0 text-white"><i class="fa fa-sliders-h me-2"></i>Setting List</h5>
          <a th:href="@{/setting/new}" class="btn btn-primary fw-medium px-3 rounded-1 shadow-sm">
            <i class="fa fa-plus me-2"></i>Add New Setting
          </a>
        </div>

        <div class="bg-dark rounded p-3 mb-4">
          <form class="row g-3 align-items-center" method="get" th:action="@{/setting}">
            <input type="hidden" name="section" value="settings"/>
            <input type="hidden" name="page" value="0"/>
            <input type="hidden" name="size" th:value="${pageSize != null ? pageSize : 5}"/>

            <div class="col-12 col-md-3">
              <select class="form-select bg-secondary border-0 text-white" name="settingTypeId" title="Setting Type">
                <option value="">All Types</option>
                <option th:each="t : ${settingTypes}"
                        th:value="${t.id}"
                        th:text="${t.name}"
                        th:selected="${selectedTypeId != null and selectedTypeId == t.id}">
                </option>
              </select>
            </div>

            <div class="col-12 col-md-3">
              <select class="form-select bg-secondary border-0 text-white" name="settingStatus" title="Setting Status">
                <option value="ALL" th:selected="${selectedStatus == null or selectedStatus == 'ALL'}">All Statuses</option>
                <option value="ACTIVE" th:selected="${selectedStatus == 'ACTIVE'}">Active</option>
                <option value="INACTIVE" th:selected="${selectedStatus == 'INACTIVE'}">Inactive</option>
              </select>
            </div>

            <div class="col-12 col-md-4">
              <input class="form-control bg-secondary border-0 text-white" name="settingKeyword"
                     placeholder="Enter keyword(s) to search..."
                     th:value="${settingKeyword}">
            </div>

            <div class="col-12 col-md-2 d-flex gap-2">
              <button class="btn btn-primary w-100 fw-medium" type="submit">
                <i class="fa fa-search me-1"></i>Search
              </button>
            </div>
          </form>
        </div>

        <div class="table-responsive">
          <table class="table table-bordered table-hover align-middle mb-0 text-light">
            <thead>
            <tr class="text-white">
              <th>Id</th>
              <th>Name</th>
              <th>Type</th>
              <th>Value</th>
              <th>Priority</th>
              <th class="text-center">Status</th>
              <th class="text-center">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${settings == null or #lists.isEmpty(settings)}">
              <td colspan="7" class="text-center text-muted py-4">No settings found.</td>
            </tr>

            <tr th:each="s : ${settings}">
              <td th:text="${s.id}"></td>
              <td class="text-white fw-bold" th:text="${s.name}"></td>
              <td th:text="${s.type != null ? s.type.name : '-'}"></td>
              <td th:text="${s.value != null ? s.value : '-'}"></td>
              <td th:text="${s.priority}"></td>

              <td class="text-center">
                                <span class="badge"
                                      th:classappend="${s.status == 'ACTIVE'} ? 'bg-success' : 'bg-danger'"
                                      th:text="${s.status}">
                                </span>
              </td>

              <td class="text-center" th:with="active=${s.status != null and #strings.equalsIgnoreCase(s.status, 'ACTIVE')}">
                <div class="d-flex justify-content-center gap-2">
                  <a th:href="@{/setting/detail(id=${s.id})}" class="btn btn-sm btn-outline-info" title="Edit">
                    <i class="fa fa-edit"></i>
                  </a>
                  <a th:href="@{/home/settings/toggle/{id}(id=${s.id},settingTypeId=${selectedTypeId},settingStatus=${selectedStatus},settingKeyword=${settingKeyword},page=${currentPage},size=${pageSize})}"
                     class="btn btn-sm"
                     th:classappend="${active} ? 'btn-outline-warning' : 'btn-outline-success'"
                     th:title="${active} ? 'Deactivate' : 'Activate'">
                    <i class="fa" th:classappend="${active} ? 'fa-ban' : 'fa-check-circle'"></i>
                  </a>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <nav class="mt-4" th:if="${totalPages != null and totalPages > 1}">
          <ul class="pagination pagination-sm mb-0 justify-content-end">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
              <a class="page-link bg-dark border-secondary text-white"
                 th:href="@{/home(section='settings',
                                page=${currentPage - 1},
                                size=${pageSize},
                                settingTypeId=${selectedTypeId},
                                settingStatus=${selectedStatus},
                                settingKeyword=${settingKeyword})}">«</a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
              <a class="page-link border-secondary"
                 th:classappend="${i == currentPage} ? 'bg-primary text-white' : 'bg-dark text-white'"
                 th:text="${i + 1}"
                 th:href="@{/home(section='settings',
                                page=${i},
                                size=${pageSize},
                                settingTypeId=${selectedTypeId},
                                settingStatus=${selectedStatus},
                                settingKeyword=${settingKeyword})}">1</a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
              <a class="page-link bg-dark border-secondary text-white"
                 th:href="@{/home(section='settings',
                                page=${currentPage + 1},
                                size=${pageSize},
                                settingTypeId=${selectedTypeId},
                                settingStatus=${selectedStatus},
                                settingKeyword=${settingKeyword})}">»</a>
            </li>
          </ul>
        </nav>

      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>

  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<div th:replace="~{fragments/notifications :: global-alerts}"></div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>
