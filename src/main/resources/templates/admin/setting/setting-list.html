<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>System Settings - StudyHub</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">

  <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">
      <div class="bg-secondary rounded p-4 h-100">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0">System Settings</h4>
          <a href="/setting/detail" class="btn btn-primary fw-medium px-3 rounded-1 shadow-sm">
            <i class="fa fa-plus me-2"></i>Add New Setting
          </a>
        </div>

        <div class="bg-dark rounded p-3 mb-4">
          <form action="/admin/settings" method="get">
            <div class="row g-3 align-items-center">

              <div class="col-12 col-md-4">
                <div class="input-group">
                  <span class="input-group-text bg-secondary border-0"><i class="fa fa-search text-muted"></i></span>
                  <input type="text" name="keyword" class="form-control bg-secondary border-0 text-white"
                         placeholder="Search by name or value...">
                </div>
              </div>

              <div class="col-6 col-md-3">
                <select name="type" class="form-select bg-secondary border-0 text-white">
                  <option value="">All Types</option>
                  <option value="User Role">User Role</option>
                  <option value="Course Category">Course Category</option>
                  <option value="Course Level">Course Level</option>
                </select>
              </div>

              <div class="col-6 col-md-3">
                <select name="status" class="form-select bg-secondary border-0 text-white">
                  <option value="">All Statuses</option>
                  <option value="ACTIVE">Active</option>
                  <option value="INACTIVE">Inactive</option>
                </select>
              </div>

              <div class="col-12 col-md-2 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1" title="Filter">
                  <i class="fa fa-filter"></i>
                </button>
                <a href="/admin/settings" class="btn btn-outline-primary" title="Reset">
                  <i class="fa fa-undo"></i>
                </a>
              </div>
            </div>
          </form>
        </div>

        <div class="table-responsive">
          <table class="table text-start align-middle table-bordered table-hover mb-0">
            <thead>
            <tr class="text-white">
              <th style="width: 5%">ID</th>
              <th style="width: 25%">Name</th>
              <th style="width: 20%">Type</th>
              <th style="width: 15%">Value</th>
              <th class="text-center" style="width: 10%">Priority</th>
              <th class="text-center" style="width: 10%">Status</th>
              <th class="text-center" style="width: 15%">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(settings)}">
              <td colspan="7" class="text-center text-muted py-4">No settings found.</td>
            </tr>

            <tr th:each="s : ${settings}">
              <td th:text="${s.id}">1</td>

              <td class="text-white fw-bold" th:text="${s.name}">Setting Name</td>

              <td th:text="${s.type != null ? s.type.name : '-'}">Type Name</td>

              <td th:text="${s.value != null ? s.value : '-'}">Value</td>

              <td class="text-center" th:text="${s.priority}">1</td>

              <td class="text-center">
                                <span class="badge"
                                      th:classappend="${s.status == 'ACTIVE'} ? 'bg-success' : 'bg-danger'"
                                      th:text="${s.status}">Active</span>
              </td>

              <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                  <a th:href="@{/admin/settings/edit/{id}(id=${s.id})}" class="btn btn-sm btn-outline-info" title="Edit">
                    <i class="fa fa-edit"></i>
                  </a>
                  <button type="button" class="btn btn-sm btn-outline-danger" title="Delete"
                          th:data-url="@{/admin/settings/delete/{id}(id=${s.id})}"
                          onclick="confirmAction('Are you sure you want to delete this setting?', this.getAttribute('data-url'))">
                    <i class="fa fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4">
          <small class="text-muted">Page 1 of 3</small>
          <nav>
            <ul class="pagination mb-0">
              <li class="page-item disabled">
                <a class="page-link bg-dark border-secondary text-white" href="#">
                  <i class="fa fa-angle-left"></i>
                </a>
              </li>
              <li class="page-item active">
                <a class="page-link border-secondary bg-primary text-white" href="#">1</a>
              </li>
              <li class="page-item">
                <a class="page-link border-secondary bg-dark text-white" href="#">2</a>
              </li>
              <li class="page-item">
                <a class="page-link border-secondary bg-dark text-white" href="#">3</a>
              </li>
              <li class="page-item">
                <a class="page-link bg-dark border-secondary text-white" href="#">
                  <i class="fa fa-angle-right"></i>
                </a>
              </li>
            </ul>
          </nav>
        </div>

      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<div th:replace="~{fragments/notifications :: global-alerts}"></div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
