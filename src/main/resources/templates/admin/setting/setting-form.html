<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting Detail</title>

    <link th:href="@{/img/favicon.ico}" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">
    <div id="spinner" class="show bg-dark position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center"></div>

    <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

    <div class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="text-white mb-0" th:text="${isEdit} ? 'Edit Setting' : 'Create Setting'">Setting Detail</h5>
                    <a class="btn btn-outline-light btn-sm" th:href="@{/home(section='settings')}">Back</a>
                </div>

                <div class="alert alert-danger" th:if="${errors != null and !#lists.isEmpty(errors)}">
                    <ul class="mb-0">
                        <li th:each="err : ${errors}" th:text="${err}"></li>
                    </ul>
                </div>

                <form method="post" th:action="@{/setting/detail}" th:object="${settingForm}">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-light">Name *</label>
                            <input type="text" class="form-control" th:field="*{name}" maxlength="20" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-light">Type</label>
                            <select class="form-select" th:field="*{typeId}">
                                <option th:value="${null}">-- Select Type --</option>
                                <option th:each="t : ${settingTypes}" th:value="${t.id}" th:text="${t.name}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-light">Value</label>
                            <input type="text" class="form-control" th:field="*{value}" maxlength="100">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-light">Priority *</label>
                            <input type="number" class="form-control" th:field="*{priority}" min="1" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label text-light d-block">Status</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="status" value="ACTIVE"
                                       th:checked="${settingForm.status == null or #strings.equalsIgnoreCase(settingForm.status, 'ACTIVE')}">
                                <label class="form-check-label text-light">Active</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="status" value="INACTIVE"
                                       th:checked="${#strings.equalsIgnoreCase(settingForm.status, 'INACTIVE')}">
                                <label class="form-check-label text-light">Inactive</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label text-light">Description</label>
                            <textarea class="form-control" rows="4" th:field="*{description}" maxlength="200"></textarea>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a class="btn btn-outline-light" th:href="@{/home(section='settings')}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
