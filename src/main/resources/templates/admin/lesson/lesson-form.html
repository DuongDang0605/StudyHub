<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title th:text="${lesson.id == null ? 'Add Lesson' : 'Edit Lesson'} + ' - StudyHub'"></title>

  <link th:href="@{/img/favicon.ico}" rel="icon"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">

  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">

      <div class="bg-secondary rounded p-4 shadow-sm mx-auto" style="max-width: 1000px;">

        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-dark">
          <h4 class="mb-0 text-white">
            <span th:text="${lesson.id == null ? 'Add New Lesson' : 'Edit Lesson'}"></span>
            <small class="text-primary fs-6 ms-2" th:text="' - Chapter: ' + ${chapter.title}"></small>
          </h4>
          <a th:href="@{'/admin/courses/' + ${courseId} + '/content'}" class="btn btn-outline-primary btn-sm fw-medium">
            <i class="fa fa-arrow-left me-1"></i>Back to Course
          </a>
        </div>

        <form th:action="@{'/admin/courses/' + ${courseId} + '/chapters/' + ${chapter.id} + '/lessons/save'}"
              th:object="${lesson}" method="post">

          <input type="hidden" th:field="*{id}" />

          <div class="row g-4">

            <div class="col-md-7 border-end border-dark pe-md-4">

              <div class="mb-3">
                <label class="form-label fw-medium text-white">Lesson Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control bg-dark border-0 text-white" th:field="*{title}" placeholder="Enter lesson title" required />
              </div>

              <div class="mb-3">
                <label class="form-label fw-medium text-white">Content Type <span class="text-danger">*</span></label>
                <select class="form-select bg-dark border-0 text-white" th:field="*{contentType}" id="contentTypeSelect">
                  <option value="VIDEO">Video (YouTube/URL)</option>
                  <option value="PDF">PDF Document</option>
                  <option value="TEXT">Text / Article</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label fw-medium text-white">Content Video / URL</label>
                <input type="text" class="form-control bg-dark border-0 text-white" th:field="*{contentUrl}" placeholder="https://www.youtube.com/watch?v=..." />
                <div class="form-text text-muted mt-1"><i class="fa fa-info-circle me-1"></i>Support YouTube, Vimeo or direct media links.</div>
              </div>

              <div class="mb-3" id="text-content-area" th:style="${lesson.contentType == 'TEXT' ? '' : 'display:none'}">
                <label class="form-label fw-medium text-white">Rich Text Content</label>
                <textarea class="form-control bg-dark border-0 text-white" th:field="*{contentText}" rows="6" placeholder="Enter lesson text content..."></textarea>
              </div>
            </div>

            <div class="col-md-5 ps-md-4 mt-4 mt-md-0">

              <div class="mb-3">
                <label class="form-label fw-medium text-white">Duration (Minutes)</label>
                <div class="input-group">
                  <input type="number" class="form-control bg-dark border-0 text-white" th:field="*{durationMinutes}" min="0" />
                  <span class="input-group-text bg-dark border-0 text-muted">min</span>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-medium text-white">Order Number <span class="text-danger">*</span></label>
                <input type="number" class="form-control bg-dark border-0 text-white" th:field="*{orderNum}" min="1" required />
                <div class="form-text text-muted mt-1">Position of lesson in this chapter.</div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-medium text-white d-block">Preview Setting</label>
                <div class="form-check form-switch p-3 border border-dark rounded bg-dark ps-5">
                  <input class="form-check-input" type="checkbox" id="isPreview" th:field="*{isPreview}" style="cursor: pointer;">
                  <label class="form-check-label fw-bold text-primary" for="isPreview" style="cursor: pointer;">Free Preview</label>
                </div>
                <small class="text-muted mt-2 d-block"><i class="fa fa-eye me-1"></i>If ON, students can view this lesson without buying the course.</small>
              </div>

            </div>
          </div>

          <div class="mt-4 pt-3 border-top border-dark d-flex justify-content-end gap-3">
            <a th:href="@{'/admin/courses/' + ${courseId} + '/content'}" class="btn btn-dark fw-medium px-4">Cancel</a>
            <button type="submit" class="btn btn-primary fw-medium px-4">
              <i class="fa fa-save me-2"></i> Save Lesson
            </button>
          </div>
        </form>

      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>

  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="fa fa-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>

<script>
  document.getElementById('contentTypeSelect').addEventListener('change', function() {
    const textArea = document.getElementById('text-content-area');
    // Thêm hiệu ứng slide nhỏ cho mượt mà (dùng jQuery sẵn có)
    if (this.value === 'TEXT') {
      $(textArea).slideDown(200);
    } else {
      $(textArea).slideUp(200);
    }
  });
</script>

</body>
</html>
