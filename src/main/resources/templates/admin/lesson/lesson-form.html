<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title th:text="${lesson.id == null ? 'Add Lesson' : 'Edit Lesson'} + ' - StudyHub'"></title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">

  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

  <div class="content">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">
      <div class="bg-light rounded p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0 text-dark">
            <span th:text="${lesson.id == null ? 'Add New Lesson' : 'Edit Lesson'}"></span>
            <small class="text-muted fs-6" th:text="' - Chapter: ' + ${chapter.title}"></small>
          </h4>
          <a th:href="@{'/admin/courses/' + ${courseId} + '/content'}" class="btn btn-outline-secondary btn-sm">
            <i class="fa fa-arrow-left me-1"></i>Back to Course
          </a>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <form th:action="@{'/admin/courses/' + ${courseId} + '/chapters/' + ${chapter.id} + '/lessons/save'}"
                  th:object="${lesson}" method="post">

              <input type="hidden" th:field="*{id}" />

              <div class="row">
                <div class="col-md-7 border-end pe-md-4">
                  <div class="mb-3">
                    <label class="form-label fw-bold">Lesson Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{title}" placeholder="Enter lesson title" required />
                  </div>

                  <div class="mb-3">
                    <label class="form-label fw-bold">Content Type <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{contentType}" id="contentTypeSelect">
                      <option value="VIDEO">Video (YouTube/URL)</option>
                      <option value="PDF">PDF Document</option>
                      <option value="TEXT">Text / Article</option>
                    </select>
                  </div>

                  <div class="mb-3">
                    <label class="form-label fw-bold">Content Video / URL</label>
                    <input type="text" class="form-control" th:field="*{contentUrl}" placeholder="https://www.youtube.com/watch?v=..." />
                    <div class="form-text">Support YouTube, Vimeo or direct media links.</div>
                  </div>

                  <div class="mb-3" id="text-content-area" th:style="${lesson.contentType == 'TEXT' ? '' : 'display:none'}">
                    <label class="form-label fw-bold">Rich Text Content</label>
                    <textarea class="form-control" th:field="*{contentText}" rows="5" placeholder="Enter lesson text content..."></textarea>
                  </div>
                </div>

                <div class="col-md-5 ps-md-4 mt-4 mt-md-0">
                  <div class="mb-3">
                    <label class="form-label fw-bold">Duration (Minutes)</label>
                    <div class="input-group">
                      <input type="number" class="form-control" th:field="*{durationMinutes}" min="0" />
                      <span class="input-group-text">min</span>
                    </div>
                  </div>

                  <div class="mb-3">
                    <label class="form-label fw-bold">Order Number <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" th:field="*{orderNum}" min="1" required />
                    <div class="form-text">Position of lesson in this chapter.</div>
                  </div>

                  <div class="mb-4">
                    <label class="form-label fw-bold d-block">Preview Setting</label>
                    <div class="form-check form-switch p-2 border rounded bg-white ps-5">
                      <input class="form-check-input" type="checkbox" id="isPreview" th:field="*{isPreview}">
                      <label class="form-check-label fw-bold text-primary" for="isPreview">Free Preview</label>
                    </div>
                    <small class="text-muted">If ON, students can view this lesson without buying the course.</small>
                  </div>

<!--                  <div class="mb-3">-->
<!--                    <label class="form-label fw-bold">Status</label>-->
<!--                    <select class="form-select" th:field="*{status}">-->
<!--                      <option value="ACTIVE">Active</option>-->
<!--                      <option value="INACTIVE">Inactive</option>-->
<!--                    </select>-->
<!--                  </div>-->
                </div>
              </div>

              <div class="mt-4 pt-3 border-top d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                  <i class="fa fa-save me-2"></i> Save Lesson
                </button>
                <a th:href="@{'/admin/courses/' + ${courseId} + '/content'}" class="btn btn-light border">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
</div>

<script>
  document.getElementById('contentTypeSelect').addEventListener('change', function() {
    const textArea = document.getElementById('text-content-area');
    if (this.value === 'TEXT') {
      textArea.style.display = 'block';
    } else {
      textArea.style.display = 'none';
    }
  });
</script>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
