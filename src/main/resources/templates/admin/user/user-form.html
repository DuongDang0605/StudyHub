<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New User - StudyHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>
<body>


<div class="main-wrapper">
  <div th:replace="~{fragments/header :: header}"></div>

  <main class="flex-grow-1 p-4">
    <div class="card-table mx-auto" style="max-width: 600px;">
      <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <h3 class="m-0 fw-bold text-dark" style="font-size: 1.5rem;">Add New User</h3>
        <a th:href="@{/users/list}" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i> Back
        </a>
      </div>

      <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <div th:text="${errorMessage}"></div>
      </div>

      <form th:action="@{/users/create}" th:object="${userDTO}" method="POST">

        <div class="mb-3">
          <label for="fullName" class="form-label fw-medium text-dark">Full Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="fullName" th:field="*{fullName}" placeholder="Enter full name" required>
        </div>

        <div class="mb-3">
          <label for="username" class="form-label fw-medium text-dark">Username <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Enter username (no spaces or accents)" required>
          <div class="form-text">Default password will be: <strong class="text-danger">123</strong></div>
        </div>

        <div class="mb-4">
          <label for="email" class="form-label fw-medium text-dark">Email Address <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="name@example.com" required>
          <div class="form-text">Account status will default to <strong class="text-warning">UNVERIFIED</strong>.</div>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary fw-medium py-2">
            <i class="bi bi-person-plus-fill me-2"></i> Create Account
          </button>
        </div>

      </form>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
