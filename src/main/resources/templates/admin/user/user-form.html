<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Create New User - StudyHub</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <div class="content">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">

      <div class="bg-secondary rounded p-4 mx-auto" style="max-width: 600px;">

        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-dark">
          <h4 class="mb-0">Add New User</h4>
          <a th:href="@{/users/list}" class="btn btn-outline-primary btn-sm fw-medium">
            <i class="fa fa-arrow-left me-1"></i> Back
          </a>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center" role="alert">
          <i class="fa fa-exclamation-triangle me-2"></i>
          <div th:text="${errorMessage}"></div>
        </div>

        <form th:action="@{/users/create}" th:object="${userDTO}" method="POST">

          <div class="mb-3">
            <label for="fullName" class="form-label fw-medium">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control bg-dark border-0 text-white" id="fullName" th:field="*{fullName}" placeholder="Enter full name" required>
          </div>

          <div class="mb-3">
            <label for="username" class="form-label fw-medium">Username <span class="text-danger">*</span></label>
            <input type="text" class="form-control bg-dark border-0 text-white" id="username" th:field="*{username}" placeholder="Enter username (no spaces or accents)" required>
            <div class="form-text text-muted">Default password will be: <strong class="text-danger">123</strong></div>
          </div>

          <div class="mb-4">
            <label for="email" class="form-label fw-medium">Email Address <span class="text-danger">*</span></label>
            <input type="email" class="form-control bg-dark border-0 text-white" id="email" th:field="*{email}" placeholder="name@example.com" required>
            <div class="form-text text-muted">Account status will default to <strong class="text-warning">UNVERIFIED</strong>.</div>
          </div>

          <div class="d-grid gap-2 mt-4 pt-3 border-top border-dark">
            <button type="submit" class="btn btn-primary fw-medium py-2">
              <i class="fa fa-user-plus me-2"></i> Create Account
            </button>
          </div>

        </form>
      </div>

    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="fa fa-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>
</body>

</html>
