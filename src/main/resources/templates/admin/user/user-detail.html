<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - StudyHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>
<body>

<div class="main-wrapper">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="flex-grow-1 p-4">
        <div class="card-table mx-auto" style="max-width: 900px;">

            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h3 class="m-0 fw-bold text-dark" style="font-size: 1.5rem;">User Details</h3>
                <a th:href="@{/users/list}" class="btn btn-secondary btn-sm fw-medium">
                    <i class="bi bi-arrow-left me-1"></i> Back to Users
                </a>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div th:text="${errorMessage}"></div>
            </div>

            <form th:action="@{/users/{id}(id=${userDTO.id})}" th:object="${userDTO}" method="POST">

                <input type="hidden" th:field="*{id}">

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-medium text-dark">Full Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{fullName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium text-dark">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" th:field="*{email}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium text-dark">Role <span class="text-danger">*</span></label>
                            <div class="p-2 border rounded bg-light">
                                <div class="form-check form-check-inline" th:each="role : ${allRoles}">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{roleIds}"
                                           th:value="${role.id}">

                                    <label class="form-check-label"
                                           th:for="${#ids.prev('roleIds')}"
                                           th:text="${role.name}">Admin</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-medium text-dark">Username <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{username}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium text-dark">Status</label>
                            <div class="d-flex gap-3 pt-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{status}" value="UNVERIFIED">
                                    <label class="form-check-label">Unverified</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{status}" value="ACTIVE">
                                    <label class="form-check-label text-success fw-medium">Active</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{status}" value="INACTIVE">
                                    <label class="form-check-label text-danger">Inactive</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium text-dark">Account Information</label>
                            <div class="p-3 bg-light border rounded text-muted" style="font-size: 0.9rem;">
                                <div class="mb-1"><strong>Created:</strong> <span th:text="${#temporals.format(userDTO.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span></div>
                                <div><strong>Last Updated:</strong> <span th:text="${#temporals.format(userDTO.updatedAt, 'yyyy-MM-dd HH:mm:ss')}"></span></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top">
                    <button type="submit" class="btn btn-primary fw-medium px-4">
                        <i class="bi bi-save me-1"></i> Submit
                    </button>
                </div>

            </form>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
