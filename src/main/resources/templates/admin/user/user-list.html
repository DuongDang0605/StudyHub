<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>User Accounts - StudyHub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link th:href="@{/img/favicon.ico}" rel="icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    <link th:href="@{/css/style.css}" rel="stylesheet">

    <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded p-4 h-100">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">User Accounts</h4>
                    <a th:href="@{/users/create}" class="btn btn-primary fw-medium px-3 rounded-1 shadow-sm">
                        <i class="fa fa-plus me-2"></i>Add New User
                    </a>
                </div>

                <div class="bg-dark rounded p-3 mb-4">
                    <form th:action="@{/users/list}" method="get">
                        <div class="row g-3 align-items-center">

                            <div class="col-12 col-md-4">
                                <div class="input-group">
                                    <span class="input-group-text bg-secondary border-0"><i class="fa fa-search text-muted"></i></span>
                                    <input type="text" name="keyword" class="form-control bg-secondary border-0 text-white"
                                           placeholder="Search name, username, email..."
                                           th:value="${currentKeyword}">
                                </div>
                            </div>

                            <div class="col-6 col-md-3">
                                <select name="roleId" class="form-select bg-secondary border-0 text-white">
                                    <option value="">All Roles</option>
                                    <option th:each="role : ${roles}"
                                            th:value="${role.id}"
                                            th:text="${role.name}"
                                            th:selected="${role.id == currentRoleId}">Role</option>
                                </select>
                            </div>

                            <div class="col-6 col-md-3">
                                <select name="status" class="form-select bg-secondary border-0 text-white">
                                    <option value="">All Status</option>
                                    <option value="ACTIVE" th:selected="${currentStatus == 'ACTIVE'}">Active</option>
                                    <option value="INACTIVE" th:selected="${currentStatus == 'INACTIVE'}">Inactive</option>
                                    <option value="UNVERIFIED" th:selected="${currentStatus == 'UNVERIFIED'}">Unverified</option>
                                </select>
                            </div>

                            <div class="col-12 col-md-2 d-flex gap-2">
                                <button type="submit" class="btn btn-primary flex-grow-1" title="Filter">
                                    <i class="fa fa-filter"></i>
                                </button>
                                <a th:href="@{/users/list}" class="btn btn-outline-primary" title="Reset">
                                    <i class="fa fa-undo"></i>
                                </a>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="table-responsive">
                    <table class="table text-start align-middle table-bordered table-hover mb-0">
                        <thead>
                        <tr class="text-white">
                            <th style="width: 5%">ID</th>
                            <th style="width: 20%">Full Name</th>
                            <th style="width: 15%">Username</th>
                            <th style="width: 25%">Email</th>
                            <th class="text-center" style="width: 15%">Role</th>
                            <th class="text-center" style="width: 10%">Status</th>
                            <th class="text-center" style="width: 10%">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>

                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="rounded-circle d-flex justify-content-center align-items-center text-white bg-dark fw-bold"
                                         style="width: 32px; height: 32px; font-size: 0.85rem;"
                                         th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">A</div>
                                    <span th:text="${user.fullName}">Administrator</span>
                                </div>
                            </td>

                            <td th:text="${user.username}">admin</td>
                            <td th:text="${user.email}">admin@example.com</td>

                            <td class="text-center">
                                        <span th:each="roleName : ${user.roles}"
                                              class="badge me-1 mb-1"
                                              th:classappend="${
                                                  roleName == 'Admin' ? 'bg-danger' :
                                                  (roleName == 'Manager' ? 'bg-warning' :
                                                  (roleName == 'Marketing' ? 'bg-info' : 'bg-primary'))
                                              }"
                                              th:text="${roleName}">
                                            Role
                                        </span>
                            </td>

                            <td class="text-center">
                                        <span class="badge"
                                              th:classappend="${
                                                user.status == 'ACTIVE' ? 'bg-success' :
                                                (user.status == 'INACTIVE' ? 'bg-danger' : 'bg-secondary')
                                              }"
                                              th:text="${user.status}">Active</span>
                            </td>

                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-info" title="Edit">
                                        <i class="fa fa-edit"></i>
                                    </a>

                                    <button type="button" class="btn btn-sm btn-outline-primary" title="Deactivate"
                                            th:data-fullname="${user.fullName}"
                                            th:data-url="@{/users/{id}/status(id=${user.id})}"
                                            onclick="confirmAction('Are you sure you want to deactivate ' + this.getAttribute('data-fullname') + '?', this.getAttribute('data-url'), {status: 'INACTIVE'})">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" class="text-center text-muted py-4">No users found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4" th:if="${totalPages > 0}">
                    <small class="text-muted" th:text="'Page ' + (${currentPage + 1}) + ' of ' + ${totalPages}"></small>
                    <nav>
                        <ul class="pagination mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link bg-dark border-secondary text-white" th:href="@{/users/list(page=${currentPage - 1}, size=${pageSize}, keyword=${currentKeyword}, roleId=${currentRoleId}, status=${currentStatus})}">
                                    <i class="fa fa-angle-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                                <a class="page-link border-secondary"
                                   th:classappend="${currentPage == i} ? 'bg-primary text-white' : 'bg-dark text-white'"
                                   th:text="${i + 1}"
                                   th:href="@{/users/list(page=${i}, size=${pageSize}, keyword=${currentKeyword}, roleId=${currentRoleId}, status=${currentStatus})}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                                <a class="page-link bg-dark border-secondary text-white" th:href="@{/users/list(page=${currentPage + 1}, size=${pageSize}, keyword=${currentKeyword}, roleId=${currentRoleId}, status=${currentStatus})}">
                                    <i class="fa fa-angle-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>

            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<div th:replace="~{fragments/notifications :: global-alerts}"></div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>

<script th:src="@{/js/app.js}"></script>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        var successMsg = /*[[${successMessage}]]*/ null;
        var errorMsg = /*[[${errorMessage}]]*/ null;

        if (successMsg) {
            showToast(successMsg, 'success');
        }

        if (errorMsg) {
            showToast(errorMsg, 'error');
        }
    });
</script>
</body>
</html>
