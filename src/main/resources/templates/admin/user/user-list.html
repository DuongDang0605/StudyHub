<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Accounts - StudyHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

    <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>
<body>

<div class="main-wrapper">

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="flex-grow-1">
        <div class="card-table">

            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h3 class="m-0 fw-bold text-dark" style="font-size: 1.5rem;">User Accounts</h3>
                <div class="card-sh mb-3 bg-light p-3 rounded shadow-sm">
                    <form th:action="@{/users/list}" method="get">
                        <div class="row g-2 align-items-center">

                            <div class="col-12 col-md-4">
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                                    <input type="text" name="keyword" class="form-control border-start-0"
                                           placeholder="Search name, username, email..."
                                           th:value="${currentKeyword}">
                                </div>
                            </div>

                            <div class="col-6 col-md-2">
                                <select name="roleId" class="form-select">
                                    <option value="">All Roles</option>
                                    <option th:each="role : ${roles}"
                                            th:value="${role.id}"
                                            th:text="${role.name}"
                                            th:selected="${role.id == currentRoleId}">Role</option>
                                </select>
                            </div>

                            <div class="col-6 col-md-2">
                                <select name="status" class="form-select">
                                    <option value="">All Status</option>
                                    <option value="ACTIVE" th:selected="${currentStatus == 'ACTIVE'}">Active</option>
                                    <option value="INACTIVE" th:selected="${currentStatus == 'INACTIVE'}">Inactive</option>
                                    <option value="UNVERIFIED" th:selected="${currentStatus == 'UNVERIFIED'}">Unverified</option>
                                </select>
                            </div>

                            <div class="col-12 col-md-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary flex-grow-1">
                                    <i class="bi bi-funnel-fill me-1"></i> Filter
                                </button>
                                <a th:href="@{/users/list}" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-clockwise"></i> Reset
                                </a>
                            </div>

                        </div>
                    </form>
                </div>
                <a th:href="@{/users/create}" class="btn btn-primary fw-medium px-3 rounded-1 shadow-sm">
                    + Add New User
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-borderless table-custom align-middle">
                    <thead>
                    <tr>
                        <th style="width: 5%">ID</th>
                        <th style="width: 20%">Full Name</th>
                        <th style="width: 15%">Username</th>
                        <th style="width: 25%">Email</th>
                        <th class="text-center" style="width: 15%">Role</th>
                        <th class="text-center" style="width: 10%">Status</th>
                        <th class="text-center" style="width: 10%">Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>

                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle d-flex justify-content-center align-items-center text-white bg-secondary fw-bold"
                                     style="width: 32px; height: 32px; font-size: 0.85rem;"
                                     th:text="${#strings.substring(user.fullName, 0, 1)}">A</div>
                                <span th:text="${user.fullName}">Administrator</span>
                            </div>
                        </td>

                        <td th:text="${user.username}">admin</td>
                        <td th:text="${user.email}">admin@example.com</td>

                        <td class="text-center">
                                <span th:each="roleName : ${user.roles}"
                                      class="badge-role me-1 mb-1"
                                      th:classappend="${
                                          roleName == 'Admin' ? 'badge-role-admin' :
                                          (roleName == 'Manager' ? 'badge-role-manager' :
                                          (roleName == 'Marketing' ? 'badge-role-marketing' : 'badge-role-member'))
                                      }"
                                      th:text="${roleName}">
                                    Role
                                </span>
                        </td>

                        <td class="text-center">
                                <span th:class="${
                                        user.status == 'ACTIVE' ? 'badge-status-active' :
                                        (user.status == 'INACTIVE' ? 'badge-status-inactive' : 'badge-status-unverified')
                                      }"
                                      th:text="${user.status}">Active</span>
                        </td>

                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/users/{id}(id=${user.id})}" class="btn-action btn-edit" title="Edit">
                                    <i class="bi bi-pencil-square"></i>
                                </a>

                                <button type="button" class="btn-action btn-delete" title="Deactivate"
                                        th:data-fullname="${user.fullName}"
                                        th:data-url="@{/users/{id}/status(id=${user.id})}"
                                        onclick="confirmAction('Are you sure you want to deactivate ' + this.getAttribute('data-fullname') + '?', this.getAttribute('data-url'), {status: 'INACTIVE'})">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="7" class="text-center text-muted py-4">No users found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 0}">
                <small class="text-muted" th:text="'Page ' + (${currentPage + 1}) + ' of ' + ${totalPages}"></small>
                <nav>
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/users/list(page=${currentPage - 1}, size=${pageSize}, keyword=${currentKeyword}, roleId=${currentRoleId}, status=${currentStatus})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:text="${i + 1}" th:href="@{/users/list(page=${i}, size=${pageSize}, keyword=${currentKeyword}, roleId=${currentRoleId}, status=${currentStatus})}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/users/list(page=${currentPage + 1}, size=${pageSize}, keyword=${currentKeyword}, roleId=${currentRoleId}, status=${currentStatus})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<div th:replace="~{fragments/notifications :: global-alerts}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        var successMsg = /*[[${successMessage}]]*/ null;
        var errorMsg = /*[[${errorMessage}]]*/ null;

        if (successMsg) {
            showToast(successMsg, 'success');
        }

        if (errorMsg) {
            showToast(errorMsg, 'error');
        }
    });
</script>

</body>
</html>
