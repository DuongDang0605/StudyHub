<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Learning Admin - Course Enrollments</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">
  <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
  <div class="content">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">
      <div class="bg-secondary rounded p-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h3 class="mb-0 text-white">Course Enrollments</h3>
          <div class="d-flex gap-2">
            <a th:href="@{/admin/enrollments/import-page}" class="btn btn-outline-success btn-sm">
              <i class="fa fa-file-import me-2"></i>Import Excel
            </a>

            <a th:href="@{/admin/enrollments/export(courseId=${selectedCourseId}, status=${selectedStatus}, keyword=${keyword})}"
               class="btn btn-success btn-sm">
              <i class="fa fa-file-export me-2"></i>Export Excel
            </a>

            <a th:href="@{/admin/enrollments/add}" class="btn btn-primary btn-sm">
              <i class="fa fa-plus me-2"></i>Add New
            </a>
          </div>
        </div>

        <form th:action="@{/admin/enrollments}" method="get" class="row g-2 mb-4 align-items-end">
          <div class="col-md-3">
            <select name="courseId" class="form-select bg-dark text-white border-0">
              <option value="">All Courses</option>
              <option th:each="c : ${courses}"
                      th:value="${c.id}"
                      th:text="${c.title}"
                      th:selected="${c.id == selectedCourseId}"></option>
            </select>
          </div>
          <div class="col-md-2">
            <select name="status" class="form-select bg-dark text-white border-0">
              <option value="All">All Status</option>
              <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">Pending</option>
              <option value="APPROVED" th:selected="${selectedStatus == 'APPROVED'}">Approved</option>
              <option value="REJECTED" th:selected="${selectedStatus == 'REJECTED'}">Rejected</option>
            </select>
          </div>
          <div class="col-md-4">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control bg-dark text-white border-0" placeholder="Full Name, Email, Course">
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Filter</button>
          </div>
        </form>

        <div class="table-responsive">
          <table class="table text-start align-middle table-bordered table-hover mb-0">
            <thead>
            <tr class="text-white">
              <th scope="col">ID</th>
              <th scope="col">Course</th>
              <th scope="col">User Info</th>
              <th scope="col">Enrolled At</th>
              <th scope="col">Status</th>
              <th scope="col">Progress</th>
              <th scope="col" class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${enrollments}">
              <td th:text="${e.id}"></td>
              <td>
                <div class="text-white fw-bold" th:text="${e.course.title}"></div>
                <small class="text-muted">Fee: <span th:text="${e.fee}"></span></small>
              </td>
              <td>
                <div class="text-white" th:text="${e.fullName}"></div>
                <small class="text-muted" th:text="${e.email}"></small>
              </td>
              <td th:text="${#temporals.format(e.enrolledAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
              <td>
                                <span class="badge"
                                      th:classappend="${e.status == 'APPROVED' ? 'bg-success' : (e.status == 'PENDING' ? 'bg-warning text-dark' : 'bg-danger')}"
                                      th:text="${e.status}"></span>
              </td>
              <td>
                <div class="d-flex align-items-center">
                  <div class="progress w-100 bg-dark me-2" style="height: 5px;">
                    <div class="progress-bar bg-primary" th:style="'width:' + ${e.progress} + '%'"></div>
                  </div>
                  <small th:text="${e.progress} + '%'"></small>
                </div>
              </td>
              <td class="text-center">
                <div class="d-flex justify-content-center gap-1">
                  <a th:href="@{/admin/enrollments/edit/{id}(id=${e.id})}" class="btn btn-sm btn-outline-info">
                    <i class="fa fa-edit"></i>
                  </a>
                  <a th:href="@{/admin/enrollments/delete/{id}(id=${e.id})}"
                     class="btn btn-sm btn-outline-danger"
                     onclick="return confirm('Bạn có chắc chắn muốn hủy đơn này?')">
                    <i class="fa fa-trash"></i>
                  </a>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4">
          <small class="text-muted">Showing page [[${currentPage + 1}]] of [[${totalPages}]]</small>
          <nav th:if="${totalPages > 0}">
            <ul class="pagination pagination-sm mb-0">
              <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link bg-dark border-0" th:href="@{/admin/enrollments(page=${currentPage - 1}, courseId=${selectedCourseId}, status=${selectedStatus}, keyword=${keyword})}">Previous</a>
              </li>
              <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link border-0" th:href="@{/admin/enrollments(page=${i}, courseId=${selectedCourseId}, status=${selectedStatus}, keyword=${keyword})}" th:text="${i + 1}"></a>
              </li>
              <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link bg-dark border-0" th:href="@{/admin/enrollments(page=${currentPage + 1}, courseId=${selectedCourseId}, status=${selectedStatus}, keyword=${keyword})}">Next</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>

    <div class="modal fade" id="importModal" tabindex="-1" aria-labelledby="importModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content bg-secondary text-white">
          <form th:action="@{/admin/enrollments/import}" method="post" enctype="multipart/form-data">
            <div class="modal-header border-0">
              <h5 class="modal-title" id="importModalLabel">Import Enrollments from Excel</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="file" class="form-label">Choose Excel File (.xlsx)</label>
                <input class="form-control bg-dark text-white border-0" type="file" name="file" id="file" accept=".xlsx" required>
              </div>
              <small class="text-muted">Lưu ý: File Excel phải tuân thủ đúng định dạng các cột theo mẫu.</small>
            </div>
            <div class="modal-footer border-0">
              <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Close</button>
              <button type="submit" class="btn btn-primary">Start Import</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
