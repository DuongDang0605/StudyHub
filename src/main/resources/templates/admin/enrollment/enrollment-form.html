<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${enrollmentDTO.id == null ? 'Add New Enrollment' : 'Edit Enrollment'}"></title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">
    <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
    <div class="content">
        <div th:replace="~{fragments/header :: header}"></div>
        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded h-100 p-4">
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <h6 class="mb-0">
                        <i class="fa fa-edit me-2 text-primary"></i>
                        <span th:text="${enrollmentDTO.id == null ? 'Add New Enrollment' : 'Enrollment Details'}"></span>
                    </h6>
                    <a th:href="@{/admin/enrollments}" class="btn btn-sm btn-outline-primary">Back to List</a>
                </div>

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fa fa-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{${enrollmentDTO.id == null ? '/admin/enrollments/add' : '/admin/enrollments/edit/' + enrollmentDTO.id}}"
                      th:method="post" th:object="${enrollmentDTO}">

                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{userId}">

                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Course Name *</label>
                            <select class="form-select bg-dark border-0 text-white" th:field="*{courseId}">
                                <option value="">-- Select Course --</option>
                                <option th:each="c : ${activeCourses}"
                                        th:value="${c.id}"
                                        th:text="${c.title}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('courseId')}" th:errors="*{courseId}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Fee *</label>
                            <input type="number" class="form-control bg-dark border-0 text-white" th:field="*{fee}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fee')}" th:errors="*{fee}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Full Name *</label>
                            <input type="text" class="form-control bg-dark border-0 text-white" th:field="*{fullName}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control bg-dark border-0 text-white" th:field="*{email}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>


                        <div class="col-12">
                            <label class="form-label">Enroll Note</label>
                            <textarea class="form-control bg-dark border-0 text-white" rows="3" th:field="*{enrollNote}"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label d-block">Status</label>
                            <div class="d-flex gap-3 mt-2">
                                <div class="form-check" th:each="st : ${ {'PENDING', 'APPROVED', 'REJECTED'} }">
                                    <input class="form-check-input" type="radio" th:value="${st}"
                                           th:field="*{status}" th:id="${'st-' + st}">
                                    <label class="form-check-label" th:for="${'st-' + st}" th:text="${st}"></label>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6" th:if="${enrollmentDTO.id != null}">
                            <label class="form-label">Last Updated</label>
                            <input type="text" class="form-control bg-dark border-0 text-muted"
                                   th:value="${enrollmentDTO.updatedAt != null ? #temporals.format(enrollmentDTO.updatedAt, 'dd/MM/yyyy HH:mm') : ''}" readonly>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Rejected Notes</label>
                            <textarea class="form-control bg-dark border-0 text-white" rows="2"
                                      th:field="*{rejectedNotes}"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Progress (%)</label>
                            <input type="number" step="0.1" class="form-control bg-dark border-0 text-white" th:field="*{progress}">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Completed At</label>
                            <input type="date" class="form-control bg-dark border-0 text-white"
                                   th:field="*{completedAt}"
                                   th:value="${enrollmentDTO.completedAt != null ? #temporals.format(enrollmentDTO.completedAt, 'yyyy-MM-dd') : ''}">

                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('completedAt')}"
                                 th:errors="*{completedAt}"></div>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fa fa-save me-2"></i>
                                <span th:text="${enrollmentDTO.id == null ? 'Create New' : 'Save Changes'}"></span>
                            </button>
                            <a th:href="@{/admin/enrollments}" class="btn btn-outline-light ms-2">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
