<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Admin Dashboard</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <link th:href="@{/img/favicon.ico}" rel="icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link th:href="@{/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">
    <link th:href="@{/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css}" rel="stylesheet" />

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">
    <div id="spinner" class="show bg-dark position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
<!--        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">-->
<!--            <span class="sr-only">Loading...</span>-->
<!--        </div>-->
    </div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded p-4 h-100">
                <h4 class="mb-4">Chào mừng đến với hệ thống quản lý!</h4>
                <p>Nội dung các bảng biểu, biểu đồ, danh sách khóa học sẽ được nhúng vào khu vực này.</p>
            </div>
        </div>

        <!-- COURSE SECTION -->
        <div class="container-fluid pt-4 px-4" th:if="${section != 'settings'}">
            <div class="bg-secondary rounded p-4">
                <form class="mb-3" method="get" th:action="@{/home}">
                    <div class="input-group">
                        <input id="courseSearch"
                               type="text"
                               class="form-control"
                               name="keyword"
                               placeholder="Tìm theo tên khóa học..."
                               th:value="${keyword}"
                               autocomplete="off">
                        <button class="btn btn-primary" type="submit">Tìm</button>
                    </div>
                </form>

                <div id="courseList" class="row g-3" th:if="${publicCourses != null and !#lists.isEmpty(publicCourses)}">
                    <div class="col-md-4" th:each="course : ${publicCourses}">
                        <div class="card h-100">
                            <img class="card-img-top"
                                 style="height:180px;object-fit:cover"
                                 th:src="${course.thumbnail != null and !#strings.isEmpty(course.thumbnail) ? course.thumbnail : '/img/user.jpg'}"
                                 alt="thumbnail">
                            <div class="card-body">
                                <h6 class="card-title" th:text="${course.title}"></h6>
                                <p class="text-muted mb-1" th:text="${course.instructor != null ? 'By ' + course.instructor.fullName : 'By Unknown'}"></p>
                                <p class="card-text text-muted" th:text="${course.description != null ? course.description : 'Không có mô tả'}"></p>
                                <a class="btn btn-primary btn-sm" th:href="@{/courses}">Enroll Now</a>
                            </div>
                        </div>
                    </div>
                </div>

                <p class="text-light mb-0" th:if="${publicCourses == null or #lists.isEmpty(publicCourses)}">
                    Chưa có khóa học công khai.
                </p>
            </div>
        </div>

        <!-- SETTINGS SECTION -->
        <div class="container-fluid pt-4 px-4" th:if="${section == 'settings'}">
            <div class="bg-secondary rounded p-4">
                <h5 class="mb-3 text-white">Setting List</h5>

                <form class="row g-2 mb-3" method="get" th:action="@{/home}">
                    <input type="hidden" name="section" value="settings"/>
                    <input type="hidden" name="page" value="0"/>
                    <input type="hidden" name="size" th:value="${pageSize != null ? pageSize : 5}"/>

                    <div class="col-md-3">
                        <select class="form-select" name="settingTypeId" title="Setting Type">
                            <option value="">All Types</option>
                            <option th:each="t : ${settingTypes}"
                                    th:value="${t.id}"
                                    th:text="${t.name}"
                                    th:selected="${selectedTypeId != null and selectedTypeId == t.id}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <select class="form-select" name="settingStatus" title="Setting Status">
                            <option value="ALL" th:selected="${selectedStatus == null or selectedStatus == 'ALL'}">All Statuses</option>
                            <option value="ACTIVE" th:selected="${selectedStatus == 'ACTIVE'}">Active</option>
                            <option value="INACTIVE" th:selected="${selectedStatus == 'INACTIVE'}">Inactive</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <input class="form-control" name="settingKeyword"
                               placeholder="Enter keyword(s) to search"
                               th:value="${settingKeyword}">
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" type="submit">Search</button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0 text-light">
                        <thead>
                        <tr>
                            <th>Id</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Value</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${settings == null or #lists.isEmpty(settings)}">
                            <td colspan="7" class="text-center">No settings found</td>
                        </tr>
                        <tr th:each="s : ${settings}">
                            <td th:text="${s.id}"></td>
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.type != null ? s.type.name : '-'}"></td>
                            <td th:text="${s.value != null ? s.value : '-'}"></td>
                            <td th:text="${s.priority}"></td>
                            <td th:text="${s.status}"></td>
                            <td th:with="active=${s.status != null and #strings.equalsIgnoreCase(s.status, 'ACTIVE')}">
                                <a th:href="@{/setting/detail(id=${s.id})}" class="btn btn-sm btn-outline-info me-2">Edit</a>
                                <a th:href="@{/home/settings/toggle/{id}(id=${s.id},settingTypeId=${selectedTypeId},settingStatus=${selectedStatus},settingKeyword=${settingKeyword},page=${currentPage},size=${pageSize})}"
                                   class="btn btn-sm"
                                   th:classappend="${active} ? 'btn-outline-warning' : 'btn-outline-success'"
                                   th:text="${active} ? 'Deactivate' : 'Activate'">
                                    Toggle
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <nav class="mt-3" th:if="${totalPages != null and totalPages > 1}">
                    <ul class="pagination pagination-sm mb-0 justify-content-end">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/home(section='settings',
                                        page=${currentPage-1},
                                        size=${pageSize},
                                        settingTypeId=${selectedTypeId},
                                        settingStatus=${selectedStatus},
                                        settingKeyword=${settingKeyword})}">«</a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link"
                               th:text="${i + 1}"
                               th:href="@{/home(section='settings',
                                        page=${i},
                                        size=${pageSize},
                                        settingTypeId=${selectedTypeId},
                                        settingStatus=${selectedStatus},
                                        settingKeyword=${settingKeyword})}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/home(section='settings',
                                        page=${currentPage+1},
                                        size=${pageSize},
                                        settingTypeId=${selectedTypeId},
                                        settingStatus=${selectedStatus},
                                        settingKeyword=${settingKeyword})}">»</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/lib/chart/chart.min.js}"></script>
<script th:src="@{/lib/easing/easing.min.js}"></script>
<script th:src="@{/lib/waypoints/waypoints.min.js}"></script>
<script th:src="@{/lib/owlcarousel/owl.carousel.min.js}"></script>
<script th:src="@{/lib/tempusdominus/js/moment.min.js}"></script>
<script th:src="@{/lib/tempusdominus/js/moment-timezone.min.js}"></script>
<script th:src="@{/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js}"></script>

<script th:src="@{/js/main.js}"></script>
</body>

</html>
