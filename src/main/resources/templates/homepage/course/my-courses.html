<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>My Courses</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link th:href="@{/img/favicon.ico}" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded p-4">
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                    <h5 class="text-white mb-0">My Approved Courses</h5>
                    <a th:href="@{/courses}" class="btn btn-outline-light btn-sm">Browse Courses</a>
                </div>

                <form class="mb-4" method="get" th:action="@{/my-courses}">
                    <input type="hidden" name="page" value="0">
                    <input type="hidden" name="size" th:value="${pageSize != null ? pageSize : 6}">
                    <div class="input-group">
                        <input type="text"
                               class="form-control"
                               name="keyword"
                               th:value="${keyword}"
                               placeholder="Search approved courses by title...">
                        <button class="btn btn-primary" type="submit">Search</button>
                    </div>
                </form>

                <div class="row g-3" th:if="${myCourses != null and !#lists.isEmpty(myCourses)}">
                    <div class="col-12 col-md-6 col-xl-4" th:each="e : ${myCourses}">
                        <div class="card h-100 border-0">
                            <img class="card-img-top"
                                 style="height:180px;object-fit:cover"
                                 th:src="${e.course != null and e.course.thumbnail != null and !#strings.isEmpty(e.course.thumbnail) ? e.course.thumbnail : '/img/user.jpg'}"
                                 alt="Course thumbnail">
                            <div class="card-body">
                                <h6 class="card-title mb-1" th:text="${e.course != null ? e.course.title : 'Untitled course'}">Course title</h6>
                                <p class="text-muted small mb-2"
                                   th:text="${e.course != null and e.course.instructor != null ? 'By ' + e.course.instructor.fullName : 'By Unknown'}">
                                    By Unknown
                                </p>
                                <p class="text-muted small mb-2"
                                   th:text="${'Enrolled: ' + #temporals.format(e.enrolledAt, 'dd/MM/yyyy HH:mm')}">
                                    Enrolled date
                                </p>

                                <div class="d-flex align-items-center gap-2 mb-3">
                                    <div class="progress flex-grow-1" style="height:8px">
                                        <div class="progress-bar bg-primary"
                                             role="progressbar"
                                             th:style="${'width:' + (e.progress != null ? e.progress : 0) + '%'}"></div>
                                    </div>
                                    <span class="small text-muted"
                                          th:text="${(e.progress != null ? e.progress : 0) + '%'}">0%</span>
                                </div>

                                <a class="btn btn-primary btn-sm w-100" th:href="@{/courses}">Go to Course</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-light" th:if="${myCourses == null or #lists.isEmpty(myCourses)}">
                    You have no approved courses yet.
                </div>

                <nav class="mt-4" th:if="${totalPages != null and totalPages > 1}">
                    <ul class="pagination pagination-sm mb-0 justify-content-end">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/my-courses(page=${currentPage-1},size=${pageSize},keyword=${keyword})}">&laquo;</a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link"
                               th:text="${i + 1}"
                               th:href="@{/my-courses(page=${i},size=${pageSize},keyword=${keyword})}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/my-courses(page=${currentPage+1},size=${pageSize},keyword=${keyword})}">&raquo;</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
