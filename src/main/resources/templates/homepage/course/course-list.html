<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Training Courses - StudyHub</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">

  <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <div class="content">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container-fluid pt-4 px-4">
      <div class="bg-secondary rounded p-4 h-100">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0">Training Courses</h4>
          <a th:href="@{/admin/courses/create}" class="btn btn-primary fw-medium px-3 rounded-1 shadow-sm">
            <i class="fa fa-plus me-2"></i>Add New Course
          </a>
        </div>

        <div class="bg-dark rounded p-3 mb-4">
          <form th:action="@{/admin/courses}" method="get">
            <div class="row g-3 align-items-center">

              <div class="col-12 col-md-4">
                <div class="input-group">
                  <span class="input-group-text bg-secondary border-0"><i class="fa fa-search text-muted"></i></span>
                  <input type="text" name="keyword" class="form-control bg-secondary border-0 text-white"
                         placeholder="Search course title..."
                         th:value="${keyword}">
                </div>
              </div>

              <div class="col-6 col-md-3">
                <select name="categoryId" class="form-select bg-secondary border-0 text-white">
                  <option value="">All Categories</option>
                  <option th:each="cat : ${categories}"
                          th:value="${cat.id}"
                          th:text="${cat.name}"
                          th:selected="${cat.id == categoryId}">Category</option>
                </select>
              </div>

              <div class="col-12 col-md-2 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1" title="Filter">
                  <i class="fa fa-filter"></i>
                </button>
                <a th:href="@{/admin/courses}" class="btn btn-outline-primary" title="Reset">
                  <i class="fa fa-undo"></i>
                </a>
              </div>
            </div>
          </form>
        </div>

        <div class="table-responsive">
          <table class="table text-start align-middle table-bordered table-hover mb-0">
            <thead>
            <tr class="text-white">
              <th style="width: 5%">ID</th>
              <th style="width: 25%">Course Title</th>
              <th style="width: 15%">Category</th>
              <th style="width: 15%">Instructor</th>
              <th class="text-center" style="width: 10%">Price</th>
              <th class="text-center" style="width: 15%">Status</th>
              <th class="text-center" style="width: 15%">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="course : ${courses}">
              <td th:text="${course.id}">1</td>

              <td>
                <div class="d-flex align-items-center gap-2">
                  <i th:if="${course.isFeatured}" class="fa fa-star text-warning" title="Featured Course"></i>
                  <span class="fw-bold text-white" th:text="${course.title}">Course Name</span>
                </div>
              </td>

              <td th:text="${course.category.name}">Programming</td>

              <td th:text="${course.instructor.fullName}">Instructor Name</td>

              <td class="text-center fw-bold" th:text="${'$' + course.listedPrice}">$0.00</td>

              <td class="text-center">
                                <span class="badge"
                                      th:classappend="${
                                        course.status == 'PUBLISHED' ? 'bg-success' : 'bg-warning'
                                      }"
                                      th:text="${course.status}">Published</span>
              </td>

              <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                  <a th:href="@{/admin/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-info" title="Edit Course">
                    <i class="fa fa-edit"></i>
                  </a>

                  <a th:href="@{/admin/{id}/chapters(id=${course.id})}" class="btn btn-sm btn-outline-primary" title="Manage Chapters">
                    <i class="fa fa-list"></i>
                  </a>

                  <button type="button" class="btn btn-sm btn-outline-danger" title="Delete Course"
                          th:data-title="${course.title}"
                          th:data-url="@{/admin/delete/{id}(id=${course.id})}"
                          onclick="confirmAction('Are you sure you want to delete course: ' + this.getAttribute('data-title') + '?', this.getAttribute('data-url'), null)">
                    <i class="fa fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>

            <tr th:if="${#lists.isEmpty(courses)}">
              <td colspan="7" class="text-center text-muted py-4">No courses found.</td>
            </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<div th:replace="~{fragments/notifications :: global-alerts}"></div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>

<script th:src="@{/js/app.js}"></script>

<script th:inline="javascript">
  document.addEventListener("DOMContentLoaded", function() {
    var successMsg = /*[[${successMessage}]]*/ null;
    var errorMsg = /*[[${errorMessage}]]*/ null;

    if (successMsg) {
      showToast(successMsg, 'success');
    }

    if (errorMsg) {
      showToast(errorMsg, 'error');
    }
  });
</script>
</body>
</html>
