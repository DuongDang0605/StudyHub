<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Course Detail</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link th:href="@{/img/favicon.ico}" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="text-white mb-0" th:text="${course.title}">Course Title</h4>
                    <a th:href="@{/courses}" class="btn btn-outline-light btn-sm">Back</a>
                </div>

                <div class="row g-4">
                    <div class="col-md-5">
                        <img class="img-fluid rounded"
                             th:src="${course.thumbnail != null and !#strings.isEmpty(course.thumbnail) ? course.thumbnail : '/img/user.jpg'}"
                             alt="thumbnail">
                    </div>
                    <div class="col-md-7">
                        <p class="mb-2 text-light"
                           th:text="${course.createdBy != null ? 'Created by: ' + course.createdBy.fullName : 'Created by: Unknown'}"></p>
                        <p class="mb-2 text-light"
                           th:text="${course.instructor != null ? 'Instructor: ' + course.instructor.fullName : 'Instructor: Unknown'}"></p>
                        <p class="mb-2 text-light"
                           th:text="${'Level: ' + (course.level != null ? course.level.name : 'N/A')}"></p>
                        <p class="mb-2 text-light"
                           th:text="${'Category: ' + (course.category != null ? course.category.name : 'N/A')}"></p>
                        <p class="mb-2 text-light" th:if="${course.duration != null}"
                           th:text="${'Duration: ' + course.duration + ' mins'}"></p>

                        <p class="mb-3">
                            <span class="text-decoration-line-through text-muted me-2"
                                  th:if="${course.salePrice != null}"
                                  th:text="${#numbers.formatDecimal((course.listedPrice != null ? course.listedPrice : 0), 1, 'POINT', 0, 'COMMA') + ' VND'}"></span>
                            <span class="fw-bold text-primary"
                                  th:text="${#numbers.formatDecimal((course.salePrice != null ? course.salePrice : (course.listedPrice != null ? course.listedPrice : 0)), 1, 'POINT', 0, 'COMMA') + ' VND'}"></span>
                        </p>

                        <form method="post" th:action="@{/enroll/create-and-checkout}">
                            <input type="hidden" name="courseId" th:value="${course.id}">
                            <button class="btn btn-primary">Enroll Now</button>
                        </form>
                    </div>
                </div>

                <hr class="text-dark my-4">
                <h5 class="text-white">Description</h5>
                <p class="text-light"
                   th:text="${course.description != null and !#strings.isEmpty(course.description) ? course.description : 'No description'}"></p>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
