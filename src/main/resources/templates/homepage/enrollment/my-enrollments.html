<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>StudyHub - My Enrollments</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">

  <style>
    .status-badge {
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .status-paid { background-color: rgba(25, 135, 84, 0.2); color: #198754; border: 1px solid #198754; }
    .status-pending { background-color: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid #ffc107; }
    .status-rejected { background-color: rgba(220, 53, 69, 0.2); color: #dc3545; border: 1px solid #dc3545; }

    .modal-content {
      background-color: #191C24;
      color: #6C7293;
      border: 1px solid #eb1616;
    }
    .user-info-text { font-size: 0.85rem; color: #6C7293; }
    .course-title-text { font-weight: 600; color: #fff; display: block; }
  </style>
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="content">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid pt-4 px-4">
      <div class="bg-secondary text-center rounded p-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h6 class="mb-0 text-white">My Learning Enrollments</h6>
        </div>
        <div class="table-responsive">
          <table class="table text-start align-middle table-bordered table-hover mb-0">
            <thead>
            <tr class="text-white">
              <th scope="col">ID</th>
              <th scope="col">Course Details</th>
              <th scope="col">User Info</th>
              <th scope="col">Enrolled Date</th>
              <th scope="col">Fee</th>
              <th scope="col">Status</th>
              <th scope="col">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${enrollments.content}">
              <td th:text="${e.id}"></td>
              <td>
                <span class="course-title-text" th:text="${e.course.title}"></span>
              </td>
              <td>
                <div class="text-white" th:text="${e.fullName}"></div>
                <div class="user-info-text" th:text="${e.email}"></div>
              </td>
              <td th:text="${#temporals.format(e.enrolledAt, 'dd MMM yyyy')}"></td>
              <td th:text="${e.fee}"></td>
              <td>
                <span th:if="${e.status == 'APPROVED'}" class="status-badge status-paid">Paid</span>
                <span th:if="${e.status == 'PENDING'}" class="status-badge status-pending">Pending</span>
                <span th:if="${e.status == 'REJECTED'}" class="status-badge status-rejected">Rejected</span>
              </td>
              <td>
                <button th:if="${e.status == 'APPROVED'}"
                        class="btn btn-sm btn-primary"
                        th:onclick="'viewProgress(' + ${e.id} + ')'">Access</button>

                <button th:if="${e.status == 'REJECTED'}"
                        class="btn btn-sm btn-outline-danger"
                        th:onclick="'viewRejection(' + ${e.id} + ')'">View Note</button>

                <a th:if="${e.status == 'PENDING'}"
                   class="btn btn-sm btn-warning"
                   th:href="@{/course/enroll(courseId=${e.course.id}, enrollId=${e.id})}">Update</a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>

  <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-bottom border-secondary">
          <h5 class="modal-title text-primary" id="modalTitle">Details</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <h6 id="mCourseName" class="text-white mb-3"></h6>

          <div id="progressSection" class="d-none">
            <label class="form-label">Learning Progress:</label>
            <div class="progress bg-dark mb-3" style="height: 20px;">
              <div id="mProgressBar" class="progress-bar progress-bar-striped bg-primary" role="progressbar">0%</div>
            </div>
          </div>

          <div id="rejectionSection" class="d-none">
            <label class="form-label text-danger">Rejection Note:</label>
            <div class="p-3 bg-dark rounded text-white" id="mRejectNote"></div>
          </div>
        </div>
        <div class="modal-footer border-top border-secondary">
          <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>

<script>
  const infoModal = new bootstrap.Modal(document.getElementById('infoModal'));

  function viewProgress(id) {
    fetch('/enroll/details/' + id)
            .then(res => res.json())
            .then(data => {
              document.getElementById('modalTitle').innerText = "Course Progress";
              document.getElementById('mCourseName').innerText = data.courseTitle;
              document.getElementById('progressSection').classList.remove('d-none');
              document.getElementById('rejectionSection').classList.add('d-none');

              const p = data.progress || 0;
              const bar = document.getElementById('mProgressBar');
              bar.style.width = p + '%';
              bar.innerText = p + '%';
              infoModal.show();
            });
  }

  function viewRejection(id) {
    fetch('/enroll/details/' + id)
            .then(res => res.json())
            .then(data => {
              console.log(data);
              document.getElementById('modalTitle').innerText = "Rejection Details";
              document.getElementById('mCourseName').innerText = data.courseTitle;
              document.getElementById('rejectionSection').classList.remove('d-none');
              document.getElementById('progressSection').classList.add('d-none');

              document.getElementById('mRejectNote').innerText = data.rejectedNotes || "No specific reason provided.";

              infoModal.show();
            })
            .catch(err => console.error("Error:", err));
  }
</script>
</body>
</html>
