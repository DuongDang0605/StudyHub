<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Password Reset - StudyHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #f8f9fa; }
    .auth-card { max-width: 400px; width: 100%; border-radius: 10px; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-sm auth-card p-4">
  <h3 class="fw-bold mb-4 text-center">Password Reset</h3>

  <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>

  <form th:action="@{/auth/forgot-password}" method="post">
    <div class="mb-4">
      <label for="email" class="form-label fw-medium">Email*</label>
      <input type="email" class="form-control" id="email" name="email" required>
    </div>

    <button type="submit" class="btn btn-light border fw-medium w-100 mb-3 text-dark" style="background-color: #f1f1f1;">
      Get Password Recovery Email
    </button>

    <div class="d-flex justify-content-between" style="font-size: 0.9rem;">
      <a th:href="@{/auth/login}" class="text-decoration-none">Back to login</a>
      <a th:href="@{/auth/register}" class="text-decoration-none">Register new account</a>
    </div>
  </form>
</div>

</body>
</html>
