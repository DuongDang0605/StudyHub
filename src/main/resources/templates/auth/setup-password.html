<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>New Password - StudyHub</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta content="" name="keywords">
  <meta content="" name="description">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">
<!--  <div id="spinner" class="show bg-dark position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">-->
<!--&lt;!&ndash;    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">&ndash;&gt;-->
<!--&lt;!&ndash;      <span class="sr-only">Loading...</span>&ndash;&gt;-->
<!--&lt;!&ndash;    </div>&ndash;&gt;-->
<!--  </div>-->
  <div class="container-fluid">
    <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
      <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
        <div class="bg-secondary rounded p-4 p-sm-5 my-4 mx-3">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <a th:href="@{/}" class="">
              <h3 class="text-primary"><i class="fa fa-user-edit me-2"></i>StudyHub</h3>
            </a>
            <h3>New Password</h3>
          </div>

          <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

          <form th:action="@{/auth/setup-password}" method="post">

            <input type="hidden" name="token" th:value="${token}" />

            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="New Password" required>
              <label for="newPassword">Password*</label>
            </div>

            <div class="form-floating mb-4">
              <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
              <label for="confirmPassword">Password Confirm*</label>
            </div>

            <button type="submit" class="btn btn-primary py-3 w-100 mb-3">
              Submit
            </button>

            <div class="d-flex align-items-center justify-content-center">
              <a th:href="@{/auth/login}" class="text-decoration-none">Back to login</a>
