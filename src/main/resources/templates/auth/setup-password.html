<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>New Password - StudyHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #f8f9fa; }
    .auth-card { max-width: 400px; width: 100%; border-radius: 10px; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-sm auth-card p-4">
  <h3 class="fw-bold mb-4 text-center">New Password</h3>

  <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

  <form th:action="@{/auth/setup-password}" method="post">
    <input type="hidden" name="token" th:value="${token}" />

    <div class="mb-3">
      <label for="newPassword" class="form-label fw-medium">Password*</label>
      <input type="password" class="form-control" id="newPassword" name="newPassword" required>
    </div>

    <div class="mb-4">
      <label for="confirmPassword" class="form-label fw-medium">Password Confirm*</label>
      <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
    </div>

    <button type="submit" class="btn btn-light border fw-medium w-100 text-dark" style="background-color: #f1f1f1;">
      Submit
    </button>
  </form>
</div>

</body>
</html>
