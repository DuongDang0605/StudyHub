<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Sign Up - StudyHub</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <link th:href="@{/img/favicon.ico}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div class="container-fluid position-relative d-flex p-0">

  <div class="container-fluid">
    <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
      <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
        <div class="bg-secondary rounded p-4 p-sm-5 my-4 mx-3 shadow-lg">

          <div class="d-flex align-items-center justify-content-between mb-3">
            <a th:href="@{/}" class="text-decoration-none">
              <h3 class="text-primary mb-0"><i class="fa fa-user-edit me-2"></i>StudyHub</h3>
            </a>
            <h3 class="mb-0">Sign Up</h3>
          </div>
          <p class="text-muted mb-4 text-center">Fill in the form below to get started</p>

          <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
          <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>

          <form th:action="@{/auth/register}" method="post">

            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Your full name" required>
              <label for="fullName">Full Name *</label>
            </div>

            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
              <label for="email">Email address *</label>
            </div>

            <div class="form-floating mb-1 position-relative">
              <input type="password" class="form-control pe-5" id="regPwd" name="password" placeholder="Min 6 characters" oninput="strengthCheck(this.value)" required>
              <label for="regPwd">Password *</label>
              <span class="position-absolute top-50 end-0 translate-middle-y me-3 pwd-toggle" style="cursor: pointer; z-index: 10;" onclick="togglePassword('regPwd', this)">
                                    <i class="fa fa-eye text-muted"></i>
                                </span>
            </div>

            <div id="strengthBar" style="height:4px;border-radius:2px;margin-bottom:15px;background:#495057;transition:all .3s"></div>

            <div class="form-floating mb-4">
              <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required>
              <label for="confirmPassword">Confirm Password *</label>
            </div>

            <button type="submit" class="btn btn-primary py-3 w-100 mb-4 fw-bold">
              <i class="fa fa-user-plus me-2"></i>Create Account
            </button>

            <p class="text-center mb-0">Already have an account? <a th:href="@{/auth/login}">Sign in here</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>

<script>
  // Password Strength Checker
  function strengthCheck(v){
    const b = document.getElementById('strengthBar');
    // Đổi màu xám nền cho hợp Dark mode (#495057)
    if(!v) { b.style.background = '#495057'; b.style.width = '100%'; return; }
    const s = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/.test(v);
    const m = v.length >= 6;
    // Màu sắc: Xanh lá (Mạnh) - Cam (Trung bình) - Đỏ (Yếu)
    b.style.background = s ? '#198754' : m ? '#fd7e14' : '#dc3545';
  }

  // Toggle Password Visibility
  function togglePassword(inputId, iconSpan) {
    const input = document.getElementById(inputId);
    const icon = iconSpan.querySelector('i');
    if (input.type === "password") {
      input.type = "text";
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      input.type = "password";
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }
</script>
</body>

</html>
