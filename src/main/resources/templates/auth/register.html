<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="/static/css/main.css" rel="stylesheet"/>
  <style>
    body{display:flex;align-items:stretch;min-height:100vh;background:#f5f7fb}
    .auth-panel{width:420px;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:40px 36px;border-right:1px solid var(--border)}
    .auth-hero{flex:1;background:linear-gradient(145deg,var(--primary) 0%,#0c3499 55%,#0a2580 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .auth-hero::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(255,255,255,.04);top:-150px;left:-100px}
    .auth-hero::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-80px;right:-60px}
    .hero-text{position:relative;z-index:1;color:#fff;text-align:center;padding:40px}
    .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .auth-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.55rem;font-weight:800;color:var(--text);margin-bottom:4px}
    .auth-sub{color:var(--text-muted);font-size:.875rem;margin-bottom:28px}
    .btn-auth{
      width:100%;
      background:linear-gradient(135deg,#1a56db,#2563eb);
      border:1px solid #1d4ed8;
      border-radius:10px;
      padding:12px;
      font-weight:700;
      font-size:.95rem;
      color:#fff;
      transition:all .2s ease;
      font-family:'Plus Jakarta Sans',sans-serif
    }
    .btn-auth:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,86,219,.3);color:#fff}
    @media(max-width:768px){.auth-hero{display:none}.auth-panel{width:100%;border:none}}
  </style>
</head>
<body>
<div class="auth-panel" style="width:480px">
  <div class="auth-logo">
    <div class="logo-icon">S</div><span class="logo-text">StudyHub</span>
  </div>
  <div class="auth-title">Create account</div>
  <div class="auth-sub">Fill in the form below to get started</div>

  <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>

  <form th:action="@{/auth/register}" method="post">
    <div class="mb-3">
      <label class="form-label">Full Name *</label>
      <input type="text" class="form-control" name="fullName" placeholder="Your full name" required/>
    </div>

    <div class="mb-3">
      <label class="form-label">Email address *</label>
      <input type="email" class="form-control" name="email" placeholder="you@example.com" required/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password *</label>
      <div class="input-group">
        <input type="password" class="form-control" id="regPwd" name="password"
               placeholder="Min 6 characters" style="border-right:none"
               oninput="strengthCheck(this.value)" required/>
        <button type="button" class="btn btn-outline-secondary pwd-toggle" data-target="#regPwd"
                style="border:1.5px solid var(--border);border-left:none;border-radius:0 8px 8px 0;background:#fff;color:var(--text-muted)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
      <div id="strengthBar" style="height:4px;border-radius:2px;margin-top:6px;background:#e2e8f0;transition:all .3s"></div>
    </div>

    <div class="mb-4">
      <label class="form-label">Confirm Password *</label>
      <input type="password" class="form-control" name="confirmPassword" placeholder="Repeat password" required/>
    </div>

    <button type="submit" class="btn btn-auth">
      <i class="bi bi-person-check-fill me-2"></i>Create Account
    </button>
  </form>
  <p class="text-center mt-4 mb-0" style="font-size:.875rem">
    Already have an account? <a href="/auth/login" style="color:var(--primary);font-weight:600">Sign in here</a>
  </p>
</div>
<div class="auth-hero">
  <div class="hero-text">
    <div style="font-size:5rem;margin-bottom:20px">🚀</div>
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:12px">Start Learning Today</div>
    <p style="opacity:.8;font-size:.9rem;line-height:1.7">Join thousands of learners and unlock access to premium courses from expert instructors.</p>
  </div>
</div>
<script>
function strengthCheck(v){
  const b=document.getElementById('strengthBar');
  if(!v){b.style.background='#e2e8f0';b.style.width='100%';return;}
  const s=/^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/.test(v);
  const m=v.length>=6;
  b.style.background=s?'#16a34a':m?'#d97706':'#dc2626';
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body></html>
