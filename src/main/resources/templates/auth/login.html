<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login - StudyHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #f8f9fa; }
    .auth-card { max-width: 400px; width: 100%; border-radius: 10px; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-sm auth-card p-4">
  <h3 class="fw-bold mb-4 text-center">User Login</h3>

  <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

  <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>

  <div th:if="${unverifiedError}" class="alert alert-warning py-2 text-center">
    <span th:text="${unverifiedError}"></span>
    <form th:action="@{/auth/resend-verification}" method="post" class="mt-2">
      <input type="hidden" name="email" th:value="${unverifiedEmail}" />
      <button type="submit" class="btn btn-sm btn-outline-danger w-100">Resend verify link via email</button>
    </form>
  </div>

  <form th:action="@{/auth/login}" method="post" th:if="${unverifiedError == null}">
    <div class="mb-3">
      <label for="email" class="form-label fw-medium">Email*</label>
      <input type="email" class="form-control" id="email" name="email" required>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label fw-medium">Password*</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>

    <div class="d-flex justify-content-between mb-4" style="font-size: 0.9rem;">
      <a th:href="@{/auth/forgot-password}" class="text-decoration-none">Forgot Password?</a>
      <a th:href="@{/auth/register}" class="text-decoration-none">Don't have an account?</a>
    </div>

    <button type="submit" class="btn btn-light border fw-medium w-100 text-dark" style="background-color: #f1f1f1;">
      Login
    </button>
  </form>
</div>

</body>
</html>
