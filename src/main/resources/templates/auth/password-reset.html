<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="/static/css/main.css" rel="stylesheet"/>
  <style>
    body{display:flex;align-items:stretch;min-height:100vh;background:#f5f7fb}
    .auth-panel{width:420px;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:40px 36px;border-right:1px solid var(--border)}
    .auth-hero{flex:1;background:linear-gradient(145deg,var(--primary) 0%,#0c3499 55%,#0a2580 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .auth-hero::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(255,255,255,.04);top:-150px;left:-100px}
    .auth-hero::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-80px;right:-60px}
    .hero-text{position:relative;z-index:1;color:#fff;text-align:center;padding:40px}
    .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .auth-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.55rem;font-weight:800;color:var(--text);margin-bottom:4px}
    .auth-sub{color:var(--text-muted);font-size:.875rem;margin-bottom:28px}
    .btn-auth{width:100%;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;border-radius:10px;padding:11px;font-weight:700;font-size:.95rem;color:#fff;transition:var(--tr);font-family:'Plus Jakarta Sans',sans-serif}
    .btn-auth:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,86,219,.3);color:#fff}
    @media(max-width:768px){.auth-hero{display:none}.auth-panel{width:100%;border:none}}
  </style>
</head>
<body>
<div class="auth-panel">
  <div class="auth-logo">
    <div class="logo-icon">S</div><span class="logo-text">StudyHub</span>
  </div>
  <div class="auth-title">Reset Password</div>
  <div class="auth-sub">Enter your email to receive a password reset link</div>
  <form>
    <div class="mb-4"><label class="form-label">Email address</label>
      <input type="email" class="form-control" placeholder="you@example.com" autofocus/></div>
    <button type="submit" class="btn btn-auth">
      <i class="bi bi-envelope-fill me-2"></i>Get Password Recovery Email
    </button>
  </form>
  <div class="d-flex justify-content-between mt-4" style="font-size:.875rem">
    <a href="/auth/login" style="color:var(--primary);font-weight:600"><i class="bi bi-arrow-left me-1"></i>Back to login</a>
    <a href="/auth/register" style="color:var(--primary);font-weight:600">Register new account</a>
  </div>
  <!-- New password form (shown after clicking email link) -->
  <hr style="margin:28px 0"/>
  <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:16px;text-align:center">— New password form (after clicking email link) —</div>
  <div style="background:var(--primary-subtle);border-radius:12px;padding:20px">
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;margin-bottom:16px">New Password</div>
    <div class="mb-3"><label class="form-label">Password *</label>
      <input type="password" class="form-control" placeholder="New password"/></div>
    <div class="mb-3"><label class="form-label">Confirm Password *</label>
      <input type="password" class="form-control" placeholder="Confirm new password"/></div>
    <button type="button" class="btn btn-primary w-100"><i class="bi bi-check-lg me-1"></i>Submit</button>
  </div>
</div>
<div class="auth-hero">
  <div class="hero-text">
    <div style="font-size:5rem;margin-bottom:20px">🔐</div>
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:12px">Secure Your Account</div>
    <p style="opacity:.8;font-size:.9rem;line-height:1.7">We'll send you a secure link to reset your password. Link expires in 30 minutes.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body></html>
